/* ============ PIPELINE VIEW (Kanban board) ============ */
async function renderPipelineView() {
  const el = document.getElementById('builder');
  el.innerHTML = `
    <div class="builder-header">
      <h1>Sales Pipeline</h1>
      <p>All leads, quotes & bookings · Drag-free kanban view</p>
    </div>
    <div id="pipeline-board" style="display: grid; grid-template-columns: repeat(${PIPELINE_STAGES.length}, minmax(220px, 1fr)); gap: 10px; overflow-x: auto; padding-bottom: 20px;">
      <div class="loading">Loading pipeline...</div>
    </div>
  `;

  // Gather all leads, itineraries, invoices and group by status
  const leads = await loadAllLeads();
  const itinKeys = await loadSavedList();
  const itineraries = [];
  for (const k of itinKeys) {
    const itin = await loadItinerary(k);
    if (itin) itineraries.push(itin);
  }
  const invKeys = await loadInvoiceList();
  const invoices = [];
  for (const k of invKeys) {
    const inv = await loadInvoice(k);
    if (inv) invoices.push(inv);
  }

  // Determine each lead's effective stage
  const board = {};
  PIPELINE_STAGES.forEach(s => board[s.key] = []);
  leads.forEach(l => {
    if (board[l.status]) board[l.status].push({ type: 'lead', data: l });
  });
  // Itineraries appear under "quote" stage if no lead is linked
  itineraries.forEach(itin => {
    const isLinked = leads.some(l => l.linkedQuoteId === itin.id);
    if (!isLinked) board.quote.push({ type: 'itinerary', data: itin });
  });
  // Invoices appear under "invoiced" stage if no lead is linked
  invoices.forEach(inv => {
    const isLinked = leads.some(l => l.linkedInvoiceId === inv.id);
    if (!isLinked) board.invoiced.push({ type: 'invoice', data: inv });
  });

  const boardEl = document.getElementById('pipeline-board');
  boardEl.innerHTML = PIPELINE_STAGES.map(stage => {
    const items = board[stage.key] || [];
    return `
      <div style="background: var(--bg); border-top: 3px solid ${stage.color}; min-height: 200px;">
        <div style="padding: 10px 12px; background: white; border-bottom: 1px solid var(--line); display: flex; justify-content: space-between; align-items: center;">
          <div style="font-size: 11px; letter-spacing: 1.5px; color: ${stage.color}; font-weight: 700; text-transform: uppercase;">${stage.icon} ${stage.label}</div>
          <div style="background: ${stage.color}; color: white; width: 22px; height: 22px; border-radius: 11px; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700;">${items.length}</div>
        </div>
        <div style="padding: 8px;">
          ${items.length === 0 ? '<div style="text-align: center; padding: 24px 8px; font-size: 11px; color: var(--ink-muted); font-style: italic;">No items</div>' : items.map(item => renderPipelineCard(item, stage)).join('')}
        </div>
      </div>
    `;
  }).join('');

  // Click handlers
  boardEl.querySelectorAll('[data-pip-lead]').forEach(card => {
    card.addEventListener('click', async () => {
      const key = card.dataset.pipLead;
      const lead = await loadLead(key);
      if (lead) {
        leadState = lead;
        activeLeadId = key;
        switchModule('leads');
      }
    });
  });
  boardEl.querySelectorAll('[data-pip-itin]').forEach(card => {
    card.addEventListener('click', async () => {
      const key = card.dataset.pipItin;
      const itin = await loadItinerary(key);
      if (itin) {
        state = itin;
        activeItineraryId = key;
        switchModule('itinerary');
      }
    });
  });
  boardEl.querySelectorAll('[data-pip-inv]').forEach(card => {
    card.addEventListener('click', async () => {
      const key = card.dataset.pipInv;
      const inv = await loadInvoice(key);
      if (inv) {
        invoiceState = inv;
        activeInvoiceId = key;
        switchModule('invoice');
      }
    });
  });
}

function renderPipelineCard(item, stage) {
  if (item.type === 'lead') {
    const l = item.data;
    return `
      <div data-pip-lead="${LEAD_STORAGE_PREFIX + l.id}" style="background: white; padding: 10px 12px; margin-bottom: 6px; border-left: 3px solid ${stage.color}; cursor: pointer; transition: all 0.15s;" onmouseover="this.style.boxShadow='0 2px 8px rgba(0,0,0,0.1)'" onmouseout="this.style.boxShadow='none'">
        <div style="font-size: 12px; font-weight: 700; color: var(--ink); margin-bottom: 3px;">${escapeHtml(l.agentName || l.agentCompany || 'Unnamed')}</div>
        ${l.agentCompany && l.agentName ? `<div style="font-size: 10px; color: var(--brand-gold-dark); margin-bottom: 4px;">${escapeHtml(l.agentCompany)}</div>` : ''}
        <div style="font-size: 10.5px; color: var(--ink-soft);">${escapeHtml(l.destination || 'No destination')}</div>
        ${l.nights || l.paxAdults ? `<div style="font-size: 10px; color: var(--ink-muted); margin-top: 2px;">${l.nights ? l.nights + 'N' : ''} ${l.paxAdults ? '· ' + l.paxAdults + 'pax' : ''}</div>` : ''}
        ${l.nextAction ? `<div style="font-size: 9.5px; color: ${stage.color}; margin-top: 4px; padding-top: 4px; border-top: 1px dotted var(--line); font-weight: 600;">⏰ ${escapeHtml(l.nextAction)}</div>` : ''}
      </div>
    `;
  }
  if (item.type === 'itinerary') {
    const itin = item.data;
    return `
      <div data-pip-itin="${STORAGE_PREFIX + itin.id}" style="background: white; padding: 10px 12px; margin-bottom: 6px; border-left: 3px solid ${stage.color}; cursor: pointer;">
        <div style="font-size: 12px; font-weight: 700; color: var(--ink);">${escapeHtml(itin.title || 'Untitled')}</div>
        <div style="font-size: 10.5px; color: var(--ink-soft); margin-top: 2px;">${escapeHtml(itin.agency || 'No agency')}</div>
        <div style="font-size: 10px; color: var(--ink-muted); margin-top: 2px;">${itin.nights}N/${itin.days}D · ${escapeHtml(itin.destination || '')}</div>
      </div>
    `;
  }
  if (item.type === 'invoice') {
    const inv = item.data;
    const totals = calcInvoiceTotals(inv);
    const cur = CURRENCIES[inv.currency] || CURRENCIES.INR;
    return `
      <div data-pip-inv="${INV_STORAGE_PREFIX + inv.id}" style="background: white; padding: 10px 12px; margin-bottom: 6px; border-left: 3px solid ${stage.color}; cursor: pointer;">
        <div style="font-size: 12px; font-weight: 700; color: var(--ink);">${escapeHtml(inv.invoiceNo)}</div>
        <div style="font-size: 10.5px; color: var(--ink-soft); margin-top: 2px;">${escapeHtml(inv.clientName || 'No client')}</div>
        <div style="font-size: 11px; color: var(--brand-magenta); font-weight: 700; margin-top: 2px;">${cur.symbol} ${Math.round(totals.grandTotal).toLocaleString()}</div>
      </div>
    `;
  }
  return '';
}

/* ============ LEADS SIDEBAR LIST ============ */
async function refreshLeadsList() {
  const ul = document.getElementById('saved-list');
  const leads = await loadAllLeads();
  if (!leads.length) {
    ul.innerHTML = '<li class="saved-empty">No leads yet. Create one to start tracking.</li>';
    return;
  }
  leads.sort((a, b) => (b.createdAt || '').localeCompare(a.createdAt || ''));
  ul.innerHTML = leads.map(lead => {
    const stage = getStage(lead.status);
    return `
      <li class="saved-item" data-lead-key="${LEAD_STORAGE_PREFIX + lead.id}" style="border-left-color: ${stage.color};">
        <div class="saved-item-title">${escapeHtml(lead.agentName || lead.agentCompany || 'Unnamed')}</div>
        <div class="saved-item-meta">${stage.icon} ${stage.label} · ${escapeHtml(lead.destination || 'No destination')}</div>
        <button class="saved-item-delete" data-lead-del-key="${LEAD_STORAGE_PREFIX + lead.id}" title="Delete">✕</button>
      </li>
    `;
  }).join('');

  ul.querySelectorAll('.saved-item').forEach(li => {
    li.addEventListener('click', async (e) => {
      if (e.target.closest('.saved-item-delete')) return;
      const key = li.dataset.leadKey;
      const lead = await loadLead(key);
      if (lead) {
        leadState = lead;
        activeLeadId = key;
        renderLeadsBuilder();
        renderLeadPreview();
        showFeedback('✓ Loaded lead');
      }
    });
  });
  ul.querySelectorAll('[data-lead-del-key]').forEach(btn => {
    btn.addEventListener('click', async (e) => {
      e.stopPropagation();
      const key = btn.dataset.leadDelKey;
      if (confirm('Delete this lead permanently?')) {
        await deleteLead(key);
        await refreshLeadsList();
        showFeedback('✓ Deleted');
      }
    });
  });
}

/* ============ TEMPLATES (save/load itinerary as template) ============ */
async function saveAsTemplate() {
  if (currentModule !== 'itinerary' && currentModule !== 'invoice') {
    alert('Templates can be saved only from Itinerary or Invoice modules.');
    return;
  }
  const name = prompt('Template name (e.g. "Kashmir Classic 5N6D"):');
  if (!name) return;
  const tpl = {
    id: 'tpl_' + Date.now(),
    name: name,
    type: currentModule,
    createdAt: new Date().toISOString(),
    data: currentModule === 'itinerary' ? JSON.parse(JSON.stringify(state)) : JSON.parse(JSON.stringify(invoiceState))
  };
  // Strip identifying info from templates (since they'll be cloned)
  if (tpl.type === 'itinerary') {
    tpl.data.agency = '';
    tpl.data.contact = '';
    tpl.data.quoteNo = '';
    tpl.data.notes = '';
  } else {
    tpl.data.clientName = '';
    tpl.data.clientAddress = '';
    tpl.data.clientEmail = '';
    tpl.data.clientPhone = '';
    tpl.data.invoiceNo = '';
  }
  try {
    await _storage.set(TPL_STORAGE_PREFIX + tpl.id, JSON.stringify(tpl));
    showFeedback('✓ Saved as template: ' + name);
    if (currentModule === 'itinerary' || currentModule === 'invoice') {
      await refreshTemplatesList();
    }
  } catch (e) { alert('Save failed: ' + e.message); }
}

async function loadAllTemplates() {
  try {
    const r = await _storage.list(TPL_STORAGE_PREFIX);
    const keys = r?.keys || [];
    const items = [];
    for (const k of keys) {
      const raw = await _storage.get(k);
      if (raw) items.push({ key: k, ...JSON.parse(raw.value) });
    }
    return items;
  } catch (e) { return []; }
}

async function refreshTemplatesList() {
  const el = document.getElementById('template-list');
  if (!el) return;
  // First show built-in templates (Kashmir Classic etc.), then user templates
  let html = TEMPLATES.map((t, i) => `
    <button class="template-btn" data-tpl="${i}">
      <strong>${escapeHtml(t.name)}</strong>
      <span>${escapeHtml(t.sub)}</span>
    </button>
  `).join('');

  // User templates
  const userTpls = await loadAllTemplates();
  if (userTpls.length) {
    html += `<div style="font-size: 9px; letter-spacing: 1.5px; color: var(--brand-magenta); font-weight: 700; text-transform: uppercase; margin: 12px 0 6px 0;">📝 Your Saved Templates</div>`;
    userTpls.forEach(t => {
      html += `
        <button class="template-btn" data-user-tpl="${escapeAttr(t.key)}" style="position: relative;">
          <strong>${escapeHtml(t.name)}</strong>
          <span>${t.type === 'itinerary' ? '📋 Itinerary' : '🧾 Invoice'} template</span>
          <span data-tpl-del="${escapeAttr(t.key)}" style="position: absolute; top: 4px; right: 4px; color: #c0392b; padding: 2px 6px; font-size: 11px;" title="Delete template">✕</span>
        </button>
      `;
    });
  }
  el.innerHTML = html;

  // Built-in templates
  el.querySelectorAll('[data-tpl]').forEach(btn => {
    btn.addEventListener('click', () => {
      const i = parseInt(btn.dataset.tpl);
      const tpl = TEMPLATES[i];
      if (confirm('Load template "' + tpl.name + '"? Current data will be replaced.')) {
        state = createBlankItinerary();
        tpl.apply(state);
        state.id = 'itin_' + Date.now();
        activeItineraryId = null;
        renderBuilder();
        renderPreview();
        showFeedback('✓ Template loaded');
      }
    });
  });

  // User templates click → load
  el.querySelectorAll('[data-user-tpl]').forEach(btn => {
    btn.addEventListener('click', async (e) => {
      if (e.target.dataset.tplDel) return;
      const key = btn.dataset.userTpl;
      const raw = await _storage.get(key);
      if (!raw) return;
      const tpl = JSON.parse(raw.value);
      if (!confirm('Load template "' + tpl.name + '"? Current data will be replaced.')) return;
      if (tpl.type === 'itinerary') {
        state = JSON.parse(JSON.stringify(tpl.data));
        state.id = 'itin_' + Date.now();
        activeItineraryId = null;
        switchModule('itinerary');
      } else {
        invoiceState = JSON.parse(JSON.stringify(tpl.data));
        invoiceState.id = 'inv_' + Date.now();
        invoiceState.invoiceNo = 'INV-' + new Date().getFullYear() + '-' + String(Math.floor(Math.random()*9000)+1000);
        activeInvoiceId = null;
        switchModule('invoice');
      }
      showFeedback('✓ Loaded: ' + tpl.name);
    });
  });

  // Delete template
  el.querySelectorAll('[data-tpl-del]').forEach(x => {
    x.addEventListener('click', async (e) => {
      e.stopPropagation();
      const key = x.dataset.tplDel;
      if (confirm('Delete this template permanently?')) {
        await _storage.delete(key);
        await refreshTemplatesList();
        showFeedback('✓ Template deleted');
      }
    });
  });
}

let invoiceState = createBlankInvoice();

const CURRENCIES = {
  'INR': { symbol: '₹', code: 'INR', name: 'Indian Rupee', locale: 'en-IN' },
  'USD': { symbol: '$', code: 'USD', name: 'US Dollar', locale: 'en-US' },
  'EUR': { symbol: '€', code: 'EUR', name: 'Euro', locale: 'de-DE' },

function createBlankInvoice() {
  const year = new Date().getFullYear();
  const seq = String(Math.floor(Math.random() * 9000) + 1000);
  return {
    id: 'inv_' + Date.now(),
    invoiceNo: `INV-${year}-${seq}`,
    issueDate: new Date().toISOString().split('T')[0],
    dueDate: '',
    clientType: 'B2C',
    clientName: '',
    clientAddress: '',
    clientEmail: '',
    clientPhone: '',
    clientCountry: '',
    destination: '',
    travelStart: '',
    travelEnd: '',
    paxCount: '',
    currency: 'INR',
    items: [
      { desc: 'Tour Package — Kashmir 5N/6D', qty: 1, rate: '', amount: '0.00', amountManual: false }
    ],
    discount: '',
    paid: '',
    paymentMethods: ['bank', 'upi'],
    bankDetails: {
      accountName: 'AZEES TRAVELS',
      accountNo: '',
      ifsc: '',
      bankName: '',
      branch: '',
      swift: ''
    },
    notes: 'Thank you for choosing Azees Travels for your journey.',
    terms: '50% advance to confirm booking. Balance payable 7 days before travel. Cancellation as per terms.'
  };
}

function formatCurrency(amount, currencyCode) {
  const c = CURRENCIES[currencyCode] || CURRENCIES.INR;
  if (amount === '' || amount === null || amount === undefined || isNaN(amount)) return c.symbol + ' 0.00';
  return c.symbol + ' ' + Number(amount).toLocaleString(c.locale, { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

function calcInvoiceTotals(inv) {
  const subtotal = inv.items.reduce((sum, it) => {
    // Use manual amount if it was set, otherwise auto-calc
    if (it.amountManual && it.amount !== '' && it.amount !== undefined && !isNaN(it.amount)) {
      return sum + Number(it.amount);
    }
    const q = Number(it.qty) || 0;
    const r = Number(it.rate) || 0;
    return sum + (q * r);
  }, 0);
  const discount = Number(inv.discount) || 0;
  const grandTotal = Math.max(0, subtotal - discount);
  const paid = Number(inv.paid) || 0;
  const balanceDue = grandTotal - paid;
  return { subtotal, discount, grandTotal, paid, balanceDue };
}

function attachInvoiceListeners() {
  // Top-level fields — only update preview, not builder, to preserve focus
  const topFields = ['invoiceNo', 'issueDate', 'dueDate', 'clientType', 'clientName', 'clientCountry',
    'clientEmail', 'clientPhone', 'clientAddress', 'destination', 'travelStart', 'travelEnd',
    'paxCount', 'discount', 'paid', 'notes', 'terms'];

  topFields.forEach(key => {
    const el = document.getElementById('inv-' + key);
    if (!el) return;
    el.addEventListener('input', () => {
      invoiceState[key] = el.value;
      renderInvoicePreview();
    });
  });

  // Currency change — re-render builder (so symbols update everywhere)
  const curEl = document.getElementById('inv-currency');
  if (curEl) curEl.addEventListener('change', () => {
    invoiceState.currency = curEl.value;
    renderInvoiceBuilder();
    renderInvoicePreview();
  });

  // Client type change — re-render so dropdown updates correctly
  const ctEl = document.getElementById('inv-clientType');
  if (ctEl) ctEl.addEventListener('change', () => {
    invoiceState.clientType = ctEl.value;
    renderInvoicePreview();
  });

  // Bank detail fields
  ['accountName', 'accountNo', 'ifsc', 'bankName', 'branch', 'swift'].forEach(key => {
    const el = document.getElementById('inv-bank-' + key);
    if (el) el.addEventListener('input', () => {
      invoiceState.bankDetails[key] = el.value;
      renderInvoicePreview();
    });
  });

  // Line item fields — only update preview AND amount cell, never re-render builder
  document.querySelectorAll('[data-item]').forEach(el => {
    el.addEventListener('input', () => {
      const idx = parseInt(el.dataset.item);
      const key = el.dataset.key;
      invoiceState.items[idx][key] = el.value;

      // If qty or rate changed, recalc the amount field for this row (unless manually overridden)
      if ((key === 'qty' || key === 'rate') && !invoiceState.items[idx].amountManual) {
        const item = invoiceState.items[idx];
        const calcAmount = (Number(item.qty) || 0) * (Number(item.rate) || 0);
        item.amount = calcAmount.toFixed(2);
        // Update the amount input in DOM directly (don't re-render)
        const amountEl = document.querySelector(`[data-item-amount="${idx}"]`);
        if (amountEl) amountEl.value = calcAmount.toFixed(2);
      }

      renderInvoicePreview();
    });
  });

  // Amount field — manual override
  document.querySelectorAll('[data-item-amount]').forEach(el => {
    el.addEventListener('input', () => {
      const idx = parseInt(el.dataset.itemAmount);
      invoiceState.items[idx].amount = el.value;
      invoiceState.items[idx].amountManual = true;
      renderInvoicePreview();
    });
  });

  // Reset amount to auto-calc (double-click amount field)
  document.querySelectorAll('[data-item-amount]').forEach(el => {
    el.addEventListener('dblclick', () => {
      const idx = parseInt(el.dataset.itemAmount);
      const item = invoiceState.items[idx];
      item.amountManual = false;
      const calcAmount = (Number(item.qty) || 0) * (Number(item.rate) || 0);
      item.amount = calcAmount.toFixed(2);
      el.value = calcAmount.toFixed(2);
      renderInvoicePreview();
      showFeedback('Amount reset to auto');
    });
  });

  // Delete item — needs full re-render since rows change
  document.querySelectorAll('[data-item-del]').forEach(btn => {
    btn.addEventListener('click', () => {
      const idx = parseInt(btn.dataset.itemDel);
      if (invoiceState.items.length > 1) {
        invoiceState.items.splice(idx, 1);
        renderInvoiceBuilder();
        renderInvoicePreview();
      } else {
        alert('At least one line item is required.');
      }
    });
  });

  // Add item — needs full re-render to show new row
  const addBtn = document.getElementById('inv-add-item');
  if (addBtn) addBtn.addEventListener('click', () => {
    invoiceState.items.push({ desc: '', qty: 1, rate: '', amount: '0.00', amountManual: false });
    renderInvoiceBuilder();
    renderInvoicePreview();
  });

  // Payment method toggles
  document.querySelectorAll('[data-pm]').forEach(cb => {
    cb.addEventListener('change', () => {
      const key = cb.dataset.pm;
      if (cb.checked) {
        if (!invoiceState.paymentMethods.includes(key)) invoiceState.paymentMethods.push(key);
      } else {
        invoiceState.paymentMethods = invoiceState.paymentMethods.filter(p => p !== key);
      }
      renderInvoiceBuilder();
      renderInvoicePreview();
    });
  });
}

function renderInvoicePreview() {
  const el = document.getElementById('preview-content');
  if (previewMode === 'email') {
    el.className = 'preview-content email-mode';
    el.innerHTML = buildInvoiceHTML();
  } else {
    el.className = 'preview-content';
    el.innerHTML = '<div class="plain-output">' + escapeHtml(buildInvoicePlainText()) + '</div>';
  }
}

function buildInvoicePlainText() {
  const inv = invoiceState;
  const totals = calcInvoiceTotals(inv);
  const cur = CURRENCIES[inv.currency] || CURRENCIES.INR;
  const fmt = (v) => formatCurrency(v, inv.currency);

  let out = '';
  out += '═══════════════════════════════════════\n';
  out += '   AZEES TRAVELS · INVOICE\n';
  out += '═══════════════════════════════════════\n\n';
  out += 'Invoice No   : ' + inv.invoiceNo + '\n';
  out += 'Issue Date   : ' + inv.issueDate + '\n';
  if (inv.dueDate) out += 'Due Date     : ' + inv.dueDate + '\n';
  out += 'Currency     : ' + cur.code + ' (' + cur.name + ')\n';
  out += 'Type         : ' + inv.clientType + '\n\n';

  out += '─── BILL TO ───\n';
  out += inv.clientName + '\n';
  if (inv.clientAddress) out += inv.clientAddress + '\n';
  if (inv.clientCountry) out += inv.clientCountry + '\n';
  if (inv.clientEmail) out += inv.clientEmail + '\n';
  if (inv.clientPhone) out += inv.clientPhone + '\n';
  out += '\n';

  if (inv.destination || inv.travelStart) {
    out += '─── TRAVEL ───\n';
    if (inv.destination) out += 'Destination: ' + inv.destination + '\n';
    if (inv.travelStart) out += 'Dates: ' + inv.travelStart + (inv.travelEnd ? ' to ' + inv.travelEnd : '') + '\n';
    if (inv.paxCount) out += 'Pax: ' + inv.paxCount + '\n';
    out += '\n';
  }

  out += '─── LINE ITEMS ───\n\n';
  inv.items.forEach((it, i) => {
    const calcAmount = (Number(it.qty) || 0) * (Number(it.rate) || 0);
    const amount = it.amountManual && it.amount !== '' && !isNaN(it.amount) ? Number(it.amount) : calcAmount;
    out += (i + 1) + '. ' + (it.desc || '—') + '\n';
    out += '   Qty: ' + (it.qty || 0) + ' × ' + fmt(it.rate) + ' = ' + fmt(amount) + '\n';
  });
  out += '\n';

  out += '─── TOTALS ───\n';
  out += 'Subtotal     : ' + fmt(totals.subtotal) + '\n';
  if (totals.discount > 0) out += 'Discount     : − ' + fmt(totals.discount) + '\n';
  out += '═════════════════════════\n';
  out += 'GRAND TOTAL  : ' + fmt(totals.grandTotal) + '\n';
  if (totals.paid > 0) {
    out += 'Paid         : − ' + fmt(totals.paid) + '\n';
    out += 'BALANCE DUE  : ' + fmt(totals.balanceDue) + '\n';
  }
  out += '\n';

  if (inv.paymentMethods.length) {
    out += '─── PAYMENT METHODS ───\n';
    inv.paymentMethods.forEach((key, i) => out += (i + 1) + '. ' + PAYMENT_METHODS[key] + '\n');
    out += '\n';
  }

  if (inv.paymentMethods.includes('bank') && inv.bankDetails.accountNo) {
    const b = inv.bankDetails;
    out += '─── BANK DETAILS ───\n';
    if (b.accountName) out += 'A/C Name : ' + b.accountName + '\n';
    if (b.accountNo) out += 'A/C No.  : ' + b.accountNo + '\n';
    if (b.bankName) out += 'Bank     : ' + b.bankName + (b.branch ? ', ' + b.branch : '') + '\n';
    if (b.ifsc) out += 'IFSC     : ' + b.ifsc + '\n';
    if (b.swift) out += 'SWIFT    : ' + b.swift + '\n';
    out += '\n';
  }

  if (inv.terms) out += '─── TERMS ───\n' + inv.terms + '\n\n';

  out += '═══════════════════════════════════════\n';
  out += 'AZEES TRAVELS · Curated Journeys Since 2022\n';
  out += '═══════════════════════════════════════\n\n';
  out += '🇮🇳 INDIA · HEAD OFFICE\n';
  out += 'Rangpura, Ellahibagh, Srinagar 190020\n';
  out += 'Jammu & Kashmir, India\n';
  out += 'M: +91 84910 64038 · +91 96222 59639\n';
  out += 'E: azeestravelsales@gmail.com\n';
  out += 'E: info@azeestravels.com\n\n';
  out += '🇲🇺 MAURITIUS · BRANCH OFFICE\n';
  out += 'Vacoas-Phoenix, Republic of Mauritius\n';
  out += 'M: +230 5965 0810\n';
  out += 'E: mauritius@azeestravels.com\n\n';
  out += 'W: www.azeestravels.com\n';
  return out;
}

/* ================================================================
   INVOICE SAVE / LOAD
================================================================ */
async function saveInvoice(inv) {
  const key = INV_STORAGE_PREFIX + inv.id;
  try {
    await _storage.set(key, JSON.stringify(inv));
    return true;
  } catch (e) {
    alert('Could not save invoice: ' + e.message);
    return false;
  }
}

async function loadInvoice(key) {
  try {
    const result = await _storage.get(key);
    return result ? JSON.parse(result.value) : null;
  } catch (e) {
    return null;
  }
}

async function deleteInvoice(key) {
  try {
    await _storage.delete(key);
    return true;
  } catch (e) {
    return false;
  }
}

async function loadInvoiceList() {
  try {
    const result = await _storage.list(INV_STORAGE_PREFIX);
    return result?.keys || [];
  } catch (e) {
    return [];
  }
}

async function refreshInvoiceList() {
  const ul = document.getElementById('saved-list');
  const keys = await loadInvoiceList();
  if (!keys.length) {
    ul.innerHTML = '<li class="saved-empty">No saved invoices yet. Build one and click Save.</li>';
    return;
  }
  const items = [];
  for (const key of keys) {
    const inv = await loadInvoice(key);
    if (inv) items.push({ key, inv });
  }
  items.sort((a, b) => (b.inv.id || '').localeCompare(a.inv.id || ''));
  ul.innerHTML = items.map(({ key, inv }) => {
    const t = calcInvoiceTotals(inv);
    const cur = CURRENCIES[inv.currency] || CURRENCIES.INR;
    return `
      <li class="saved-item" data-inv-key="${escapeAttr(key)}">
        <div class="saved-item-title">${escapeHtml(inv.invoiceNo)}</div>
        <div class="saved-item-meta">${escapeHtml(inv.clientName || 'No client')} · ${cur.symbol}${Math.round(t.grandTotal).toLocaleString()}</div>
        <button class="saved-item-delete" data-inv-del-key="${escapeAttr(key)}" title="Delete">✕</button>
      </li>
    `;
  }).join('');

  ul.querySelectorAll('.saved-item').forEach(li => {
    li.addEventListener('click', async (e) => {
      if (e.target.closest('.saved-item-delete')) return;
      const key = li.dataset.invKey;
      const inv = await loadInvoice(key);
      if (inv) {
        invoiceState = inv;
        activeInvoiceId = key;
        renderInvoiceBuilder();
        renderInvoicePreview();
        showFeedback('✓ Loaded: ' + inv.invoiceNo);
      }
    });
  });

  ul.querySelectorAll('[data-inv-del-key]').forEach(btn => {
    btn.addEventListener('click', async (e) => {
      e.stopPropagation();
      const key = btn.dataset.invDelKey;
      if (confirm('Delete this invoice permanently?')) {
        await deleteInvoice(key);
        await refreshInvoiceList();
        showFeedback('✓ Deleted');
      }
    });
  });
}

function switchModule(mod) {
  currentModule = mod;
  document.querySelectorAll('.mod-btn').forEach(b => b.classList.toggle('active', b.dataset.mod === mod));

  const sidebarHeaders = document.querySelectorAll('.sidebar h3');
  const quickTemplates = document.querySelector('.quick-templates');

  if (mod === 'itinerary') {
    renderBuilder();
    renderPreview();
    refreshTemplatesList();
    refreshSavedList();
    sidebarHeaders[0].textContent = '📋 Quick Templates';
    sidebarHeaders[1].textContent = '💼 Saved Itineraries';
    quickTemplates.style.display = '';
  } else if (mod === 'invoice') {
    renderInvoiceBuilder();
    renderInvoicePreview();
    refreshTemplatesList();
    refreshInvoiceList();
    sidebarHeaders[0].textContent = '📋 Quick Templates';
    sidebarHeaders[1].textContent = '📑 Saved Invoices';
    quickTemplates.style.display = '';
  } else if (mod === 'leads') {
    renderLeadsBuilder();
    renderLeadPreview();
    refreshLeadsList();
    sidebarHeaders[0].textContent = '🚀 Lead Actions';
    sidebarHeaders[1].textContent = '📥 All Leads';
    quickTemplates.style.display = 'none';
  } else if (mod === 'pipeline') {
    renderPipelineView();
    document.getElementById('preview-content').innerHTML = '<div style="padding: 24px; color: #aaa; text-align: center; font-size: 12px;">Click any card on the board to open it.</div>';
    refreshLeadsList();
    sidebarHeaders[0].textContent = '📊 Pipeline Tools';
    sidebarHeaders[1].textContent = '📥 All Leads';
    quickTemplates.style.display = 'none';
  } else if (mod === 'queryhub') {
    renderQueryHub();
    renderQueryHubPreview();
    refreshQueriesList();
    sidebarHeaders[0].textContent = '📞 Query Tools';
    sidebarHeaders[1].textContent = '📞 All Queries';
    quickTemplates.style.display = 'none';
  } else if (mod === 'dashboard') {
    renderDashboard();
    document.getElementById('preview-content').innerHTML = '<div style="padding: 24px; color: #aaa; text-align: center; font-size: 12px;">Dashboard view · No preview needed.</div>';
    refreshQueriesList();
    sidebarHeaders[0].textContent = '📈 Dashboard';
    sidebarHeaders[1].textContent = '📞 All Queries';
    quickTemplates.style.display = 'none';
  }
}

document.getElementById('mod-itinerary').addEventListener('click', () => switchModule('itinerary'));

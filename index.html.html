<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Azees Travels — B2B Itinerary Builder</title>
<style>
  :root {
    --brand-magenta: #7c236a;
    --brand-magenta-dark: #5a1850;
    --brand-magenta-light: #f5e8f1;
    --brand-gold: #ba9c62;
    --brand-gold-dark: #8e7547;
    --brand-gold-light: #faf4e8;
    --ink: #1a1a1a;
    --ink-soft: #4a4a4a;
    --ink-muted: #888;
    --line: #e8e3da;
    --bg: #faf8f5;
    --white: #ffffff;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--ink);
    line-height: 1.5;
    font-size: 14px;
  }

  /* ============ TOP NAV ============ */
  .topnav {
    background: white;
    color: var(--ink);
    padding: 14px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 3px solid var(--brand-gold);
    box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .nav-brand {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .nav-logo {
    width: 44px; height: 44px;
    background: white;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 4px;
    box-sizing: border-box;
  }
  .nav-title {
    font-size: 11px;
    letter-spacing: 4px;
    font-weight: 700;
    color: var(--brand-magenta);
  }
  .nav-sub {
    font-size: 8.5px;
    letter-spacing: 2.5px;
    color: var(--brand-gold-dark);
    margin-top: 2px;
  }
  .nav-actions {
    display: flex;
    gap: 8px;
  }
  .nav-btn {
    background: transparent;
    color: var(--ink-soft);
    border: 1px solid var(--line);
    padding: 7px 14px;
    font-size: 11px;
    letter-spacing: 1.5px;
    cursor: pointer;
    text-transform: uppercase;
    font-weight: 600;
    transition: all 0.2s;
    font-family: inherit;
  }
  .nav-btn:hover {
    background: var(--brand-magenta);
    border-color: var(--brand-magenta);
    color: white;
  }
  .nav-btn.primary {
    background: var(--brand-magenta);
    border-color: var(--brand-magenta);
    color: white;
  }
  .nav-btn.primary:hover {
    background: var(--brand-magenta-dark);
  }
  .nav-btn.gold {
    background: var(--brand-gold);
    color: var(--ink);
    border-color: var(--brand-gold);
  }
  .nav-btn.gold:hover {
    background: var(--brand-gold-dark);
    color: white;
  }

  /* ============ MODULE SWITCHER ============ */
  .module-switcher {
    display: flex;
    gap: 4px;
    background: var(--bg);
    padding: 4px;
    border: 1px solid var(--line);
  }
  .mod-btn {
    background: transparent;
    color: var(--ink-muted);
    border: none;
    padding: 8px 16px;
    font-size: 11px;
    letter-spacing: 1.5px;
    cursor: pointer;
    text-transform: uppercase;
    font-weight: 600;
    font-family: inherit;
    transition: all 0.2s;
  }
  .mod-btn:hover {
    color: var(--ink);
    background: white;
  }
  .mod-btn.active {
    background: var(--brand-magenta);
    color: white;
  }

  /* ============ LAYOUT ============ */
  .app {
    display: grid;
    grid-template-columns: 320px 1fr 460px;
    height: calc(100vh - 65px);
    overflow: hidden;
  }

  /* ============ SIDEBAR ============ */
  .sidebar {
    background: white;
    border-right: 1px solid var(--line);
    overflow-y: auto;
    padding: 20px 18px;
  }
  .sidebar h3 {
    font-size: 10px;
    letter-spacing: 2.5px;
    color: var(--brand-magenta);
    font-weight: 700;
    text-transform: uppercase;
    margin-bottom: 10px;
    padding-bottom: 8px;
    border-bottom: 2px solid var(--brand-gold);
  }
  .saved-list {
    list-style: none;
    margin-bottom: 24px;
  }
  .saved-item {
    background: var(--bg);
    padding: 10px 12px;
    margin-bottom: 6px;
    border-left: 3px solid var(--brand-gold);
    cursor: pointer;
    font-size: 12px;
    transition: all 0.15s;
    position: relative;
  }
  .saved-item:hover {
    background: var(--brand-magenta-light);
    border-left-color: var(--brand-magenta);
  }
  .saved-item-title {
    font-weight: 600;
    color: var(--ink);
    margin-bottom: 3px;
    padding-right: 22px;
  }
  .saved-item-meta {
    color: var(--ink-muted);
    font-size: 10.5px;
    letter-spacing: 0.5px;
  }
  .saved-item-delete {
    position: absolute;
    top: 8px;
    right: 8px;
    background: transparent;
    border: none;
    color: var(--ink-muted);
    cursor: pointer;
    font-size: 14px;
    padding: 2px 6px;
    line-height: 1;
  }
  .saved-item-delete:hover {
    color: var(--brand-magenta);
  }
  .saved-empty {
    font-size: 11px;
    color: var(--ink-muted);
    font-style: italic;
    padding: 8px 0;
  }
  .new-btn {
    width: 100%;
    background: var(--brand-magenta);
    color: white;
    border: none;
    padding: 11px;
    font-size: 11px;
    letter-spacing: 2px;
    cursor: pointer;
    text-transform: uppercase;
    font-weight: 700;
    font-family: inherit;
    transition: background 0.2s;
    margin-bottom: 24px;
  }
  .new-btn:hover { background: var(--brand-magenta-dark); }

  .quick-templates {
    margin-top: 6px;
  }
  .template-btn {
    width: 100%;
    background: var(--brand-gold-light);
    color: var(--ink);
    border: 1px solid var(--brand-gold);
    padding: 9px 11px;
    font-size: 11px;
    cursor: pointer;
    text-align: left;
    margin-bottom: 5px;
    font-family: inherit;
    transition: all 0.15s;
  }
  .template-btn:hover {
    background: var(--brand-gold);
    color: var(--ink);
  }
  .template-btn strong {
    display: block;
    font-size: 11.5px;
    margin-bottom: 1px;
  }
  .template-btn span {
    font-size: 10px;
    color: var(--ink-muted);
    letter-spacing: 1px;
  }

  /* ============ BUILDER (MAIN) ============ */
  .builder {
    overflow-y: auto;
    padding: 24px 28px;
    background: var(--bg);
  }
  .builder-header {
    background: linear-gradient(135deg, var(--brand-magenta) 0%, var(--brand-magenta-dark) 100%);
    color: white;
    padding: 18px 22px;
    margin-bottom: 18px;
    position: relative;
    overflow: hidden;
  }
  .builder-header::after {
    content: '';
    position: absolute;
    top: 0; right: 0;
    width: 0; height: 0;
    border-style: solid;
    border-width: 0 50px 50px 0;
    border-color: transparent var(--brand-gold) transparent transparent;
  }
  .builder-header h1 {
    font-size: 18px;
    font-weight: 300;
    letter-spacing: 1.5px;
    margin-bottom: 3px;
  }
  .builder-header p {
    font-size: 10.5px;
    letter-spacing: 2px;
    color: var(--brand-gold);
    text-transform: uppercase;
    font-weight: 600;
  }

  .section {
    background: white;
    margin-bottom: 14px;
    border: 1px solid var(--line);
  }
  .section-head {
    padding: 12px 18px;
    border-bottom: 1px solid var(--line);
    background: var(--brand-magenta-light);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .section-head h2 {
    font-size: 11px;
    letter-spacing: 2.5px;
    color: var(--brand-magenta);
    font-weight: 700;
    text-transform: uppercase;
  }
  .section-head .badge {
    background: var(--brand-magenta);
    color: white;
    font-size: 10px;
    padding: 3px 8px;
    letter-spacing: 1px;
    font-weight: 600;
  }
  .section-body {
    padding: 16px 18px;
  }

  /* Form fields */
  .row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 10px;
  }
  .row.row-3 { grid-template-columns: 1fr 1fr 1fr; }
  .row.row-1 { grid-template-columns: 1fr; }
  .field {
    display: flex;
    flex-direction: column;
  }
  .field label {
    font-size: 9.5px;
    letter-spacing: 1.8px;
    color: var(--brand-gold-dark);
    text-transform: uppercase;
    font-weight: 700;
    margin-bottom: 5px;
  }
  .field input, .field textarea, .field select {
    border: 1px solid var(--line);
    padding: 8px 10px;
    font-size: 13px;
    font-family: inherit;
    background: white;
    color: var(--ink);
    transition: border-color 0.15s;
  }
  .field input:focus, .field textarea:focus, .field select:focus {
    outline: none;
    border-color: var(--brand-magenta);
  }
  .field textarea {
    resize: vertical;
    min-height: 70px;
    line-height: 1.5;
  }

  /* Day blocks */
  .day-card {
    background: white;
    border: 1px solid var(--line);
    margin-bottom: 10px;
    overflow: hidden;
  }
  .day-card-head {
    background: var(--ink);
    color: white;
    padding: 9px 14px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .day-card-num {
    background: var(--brand-gold);
    color: var(--ink);
    width: 32px;
    height: 32px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    font-size: 13px;
  }
  .day-card-title {
    flex: 1;
    margin: 0 12px;
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.5px;
  }
  .day-card-actions {
    display: flex;
    gap: 4px;
  }
  .icon-btn {
    background: transparent;
    color: white;
    border: 1px solid #555;
    padding: 4px 9px;
    cursor: pointer;
    font-size: 10px;
    font-family: inherit;
    transition: all 0.15s;
  }
  .icon-btn:hover {
    background: var(--brand-magenta);
    border-color: var(--brand-magenta);
  }
  .icon-btn.danger:hover {
    background: #c0392b;
    border-color: #c0392b;
  }
  .day-card-body {
    padding: 14px;
  }
  .add-day {
    width: 100%;
    background: var(--brand-gold);
    color: var(--ink);
    border: none;
    padding: 12px;
    font-size: 11px;
    letter-spacing: 2px;
    cursor: pointer;
    text-transform: uppercase;
    font-weight: 700;
    font-family: inherit;
    margin-top: 4px;
    transition: background 0.2s;
  }
  .add-day:hover { background: var(--brand-gold-dark); color: white; }

  /* Pricing table inputs */
  .price-table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 8px;
  }
  .price-table th, .price-table td {
    border: 1px solid var(--line);
    padding: 6px 8px;
    font-size: 11.5px;
  }
  .price-table th {
    background: var(--ink);
    color: var(--brand-gold);
    font-size: 9.5px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    font-weight: 700;
  }
  .price-table td.label {
    background: var(--bg);
    font-weight: 500;
  }
  .price-table input {
    width: 100%;
    border: none;
    padding: 5px;
    font-size: 12px;
    text-align: center;
    background: transparent;
    font-family: inherit;
    color: var(--ink);
  }
  .price-table input:focus {
    outline: 1px solid var(--brand-magenta);
    background: var(--brand-magenta-light);
  }

  /* ============ PREVIEW PANEL ============ */
  .preview {
    background: #2a2a2a;
    color: #e8e8e8;
    overflow-y: auto;
    padding: 18px;
    display: flex;
    flex-direction: column;
  }
  .preview-tabs {
    display: flex;
    margin-bottom: 14px;
    border-bottom: 1px solid #444;
  }
  .preview-tab {
    background: transparent;
    color: #aaa;
    border: none;
    padding: 9px 14px;
    font-size: 10px;
    letter-spacing: 1.8px;
    cursor: pointer;
    text-transform: uppercase;
    font-weight: 600;
    font-family: inherit;
    border-bottom: 2px solid transparent;
    transition: all 0.15s;
  }
  .preview-tab.active {
    color: var(--brand-gold);
    border-bottom-color: var(--brand-gold);
  }
  .preview-tab:hover { color: white; }

  .preview-content {
    flex: 1;
    background: white;
    color: var(--ink);
    padding: 24px;
    overflow-y: auto;
    font-size: 12px;
    line-height: 1.6;
  }
  .preview-content.email-mode {
    background: white;
    padding: 0;
  }
  .preview-actions {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-top: 14px;
  }
  .copy-btn {
    background: var(--brand-gold);
    color: var(--ink);
    border: none;
    padding: 12px;
    font-size: 11px;
    letter-spacing: 2px;
    cursor: pointer;
    text-transform: uppercase;
    font-weight: 700;
    font-family: inherit;
    transition: background 0.2s;
  }
  .copy-btn:hover { background: var(--brand-gold-dark); color: white; }
  .copy-btn.magenta {
    background: var(--brand-magenta);
    color: white;
  }
  .copy-btn.magenta:hover { background: var(--brand-magenta-dark); }
  .copy-feedback {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--brand-magenta);
    color: white;
    padding: 12px 24px;
    font-size: 12px;
    letter-spacing: 2px;
    text-transform: uppercase;
    font-weight: 700;
    opacity: 0;
    transition: opacity 0.3s;
    z-index: 1000;
    pointer-events: none;
  }
  .copy-feedback.show { opacity: 1; }

  /* ============ FORMATTED EMAIL OUTPUT ============ */
  .email-output {
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    font-size: 13px;
    line-height: 1.65;
    color: #2a2a2a;
    background: white;
    padding: 32px 28px;
  }
  .email-output h2.brand {
    color: var(--brand-magenta);
    font-size: 18px;
    letter-spacing: 4px;
    font-weight: 300;
    margin-bottom: 4px;
    text-transform: uppercase;
  }
  .email-output .brand-sub {
    color: var(--brand-gold);
    font-size: 9px;
    letter-spacing: 3px;
    font-weight: 600;
    margin-bottom: 18px;
    text-transform: uppercase;
    border-bottom: 2px solid var(--brand-gold);
    padding-bottom: 12px;
  }
  .email-output h3 {
    color: var(--brand-magenta);
    font-size: 13px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    font-weight: 700;
    margin-top: 22px;
    margin-bottom: 10px;
    border-left: 3px solid var(--brand-gold);
    padding-left: 10px;
  }
  .email-output .greeting {
    margin-bottom: 14px;
    color: var(--ink-soft);
  }
  .email-output .meta-block {
    background: var(--bg);
    padding: 12px 14px;
    margin-bottom: 18px;
    border-left: 3px solid var(--brand-magenta);
    font-size: 12px;
  }
  .email-output .meta-block strong {
    color: var(--brand-magenta);
    letter-spacing: 1px;
  }
  .email-output .day {
    background: var(--bg);
    padding: 12px 14px;
    margin-bottom: 8px;
    border-left: 3px solid var(--brand-gold);
  }
  .email-output .day-num {
    background: var(--brand-magenta);
    color: white;
    display: inline-block;
    padding: 2px 9px;
    font-size: 10px;
    letter-spacing: 1.5px;
    font-weight: 700;
    margin-bottom: 5px;
  }
  .email-output .day-title {
    font-size: 13px;
    font-weight: 600;
    color: var(--ink);
    margin-bottom: 5px;
  }
  .email-output .day-desc {
    font-size: 12px;
    color: var(--ink-soft);
    line-height: 1.6;
  }
  .email-output .day-meta {
    font-size: 10.5px;
    color: var(--ink-muted);
    margin-top: 5px;
    letter-spacing: 0.5px;
  }
  .email-output .day-meta strong { color: var(--brand-gold-dark); }
  .email-output table.price {
    width: 100%;
    border-collapse: collapse;
    margin-top: 6px;
    font-size: 11.5px;
  }
  .email-output table.price th {
    background: var(--brand-magenta);
    color: white;
    padding: 7px 8px;
    font-size: 10px;
    letter-spacing: 1.2px;
    text-transform: uppercase;
    border: 1px solid var(--brand-magenta-dark);
  }
  .email-output table.price td {
    padding: 6px 8px;
    border: 1px solid var(--line);
    text-align: center;
  }
  .email-output table.price td.label {
    text-align: left;
    background: var(--brand-gold-light);
    font-weight: 600;
  }
  .email-output .inc-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-top: 6px;
  }
  .email-output .inc-grid ul {
    list-style: none;
    padding: 0;
  }
  .email-output .inc-grid li {
    padding: 3px 0 3px 16px;
    font-size: 11.5px;
    position: relative;
    color: var(--ink-soft);
  }
  .email-output .inc-grid li.yes::before {
    content: '✓';
    color: var(--brand-magenta);
    position: absolute;
    left: 0;
    font-weight: 700;
  }
  .email-output .inc-grid li.no::before {
    content: '✕';
    color: #c0392b;
    position: absolute;
    left: 0;
    font-weight: 700;
  }
  .email-output .signature {
    margin-top: 24px;
    padding-top: 14px;
    border-top: 2px solid var(--brand-gold);
    font-size: 11.5px;
    color: var(--ink-soft);
    line-height: 1.7;
  }
  .email-output .signature strong {
    color: var(--brand-magenta);
    font-size: 13px;
    letter-spacing: 0.5px;
  }
  .email-output .signature .gold {
    color: var(--brand-gold-dark);
    font-weight: 600;
  }

  /* Plain text view */
  .plain-output {
    font-family: 'Courier New', monospace;
    font-size: 12px;
    line-height: 1.55;
    background: var(--bg);
    padding: 18px;
    white-space: pre-wrap;
    color: var(--ink-soft);
    border: 1px dashed var(--line);
  }

  /* ============ MOBILE RESPONSIVE ============ */
  @media (max-width: 900px) {
    /* Top nav stacks vertically */
    .topnav {
      flex-direction: column;
      align-items: stretch;
      gap: 10px;
      padding: 10px 14px;
    }
    .nav-brand {
      justify-content: center;
    }
    .nav-title { font-size: 10px; letter-spacing: 3px; }
    .nav-sub { font-size: 8px; letter-spacing: 1.5px; }

    .module-switcher {
      width: 100%;
      justify-content: center;
      flex-wrap: wrap;
      gap: 2px;
    }
    .mod-btn {
      flex: 1 1 calc(50% - 2px);
      padding: 8px 4px;
      font-size: 9.5px;
      letter-spacing: 0.8px;
      min-width: 0;
    }

    .nav-actions {
      flex-wrap: wrap;
      justify-content: center;
      gap: 6px;
    }
    .nav-btn {
      padding: 8px 11px;
      font-size: 10px;
      letter-spacing: 1px;
      flex: 1 1 auto;
      min-width: 70px;
    }

    /* Switch from 3-column grid to single column stack */
    .app {
      grid-template-columns: 1fr;
      grid-template-rows: auto auto auto;
      height: auto;
      overflow: visible;
    }

    /* Sidebar becomes a top bar with horizontal scroll */
    .sidebar {
      border-right: none;
      border-bottom: 2px solid var(--brand-gold);
      max-height: 250px;
      padding: 14px;
    }
    .sidebar h3 {
      font-size: 9px;
      letter-spacing: 2px;
    }
    .new-btn {
      padding: 10px;
      font-size: 10.5px;
      margin-bottom: 16px;
    }
    .template-btn {
      padding: 8px 10px;
      font-size: 11px;
    }
    .saved-item {
      padding: 8px 10px;
      font-size: 11px;
    }

    /* Builder full width */
    .builder {
      padding: 14px 12px;
    }
    .builder-header {
      padding: 14px 16px;
    }
    .builder-header h1 {
      font-size: 15px;
    }
    .builder-header p {
      font-size: 9.5px;
    }

    /* Form rows stack on mobile */
    .row, .row.row-3 {
      grid-template-columns: 1fr !important;
      gap: 8px;
    }

    .section-head {
      padding: 10px 14px;
    }
    .section-head h2 {
      font-size: 10px;
      letter-spacing: 1.8px;
    }
    .section-body {
      padding: 12px 14px;
    }

    .field label {
      font-size: 9px;
      letter-spacing: 1.5px;
    }
    .field input, .field textarea, .field select {
      font-size: 14px;
      padding: 9px 10px;
    }

    /* Day cards more compact */
    .day-card-head {
      padding: 7px 10px;
      flex-wrap: wrap;
    }
    .day-card-num {
      width: 26px;
      height: 26px;
      font-size: 11px;
    }
    .day-card-title {
      font-size: 11px;
      margin: 0 8px;
    }
    .day-card-body {
      padding: 10px;
    }
    .icon-btn {
      padding: 3px 7px;
      font-size: 9px;
    }
    .add-day {
      padding: 10px;
      font-size: 10px;
      letter-spacing: 1.5px;
    }

    /* Pricing table — make it scrollable horizontally on mobile */
    .price-table {
      font-size: 11px;
    }
    .price-table th, .price-table td {
      padding: 5px 6px;
    }
    .price-table input {
      font-size: 11px;
      padding: 4px;
    }

    /* Preview panel — push to bottom, fixed height */
    .preview {
      padding: 14px;
      max-height: 70vh;
      border-top: 2px solid var(--brand-gold);
    }
    .preview-tabs {
      margin-bottom: 10px;
    }
    .preview-tab {
      padding: 7px 10px;
      font-size: 9.5px;
      letter-spacing: 1.2px;
      flex: 1;
    }
    .preview-content {
      padding: 14px;
      font-size: 11px;
    }
    .preview-actions {
      grid-template-columns: 1fr;
      gap: 6px;
    }
    .copy-btn {
      padding: 11px;
      font-size: 10px;
      letter-spacing: 1.5px;
    }

    /* Email output (preview) padding tighter on mobile */
    .email-output {
      padding: 14px !important;
      font-size: 11px;
    }

    /* Two-column inclusions grid stacks on mobile */
    .email-output .inc-grid {
      grid-template-columns: 1fr !important;
    }
  }

  /* Extra small phones (< 480px) */
  @media (max-width: 480px) {
    .nav-actions { gap: 4px; }
    .nav-btn { padding: 7px 8px; font-size: 9px; min-width: 60px; }
    .nav-logo { width: 36px; height: 36px; }
    .nav-title { font-size: 9px; letter-spacing: 2.5px; }
    .nav-sub { display: none; }

    .builder { padding: 10px 8px; }
    .section-body { padding: 10px 12px; }
    .preview { padding: 10px; }
  }

  ::-webkit-scrollbar { width: 9px; height: 9px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb {
    background: var(--brand-gold);
    border-radius: 0;
  }
  ::-webkit-scrollbar-thumb:hover { background: var(--brand-magenta); }

  /* Loading state */
  .loading {
    text-align: center;
    padding: 40px;
    color: var(--ink-muted);
    font-size: 12px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
  }
</style>
</head>

/* ================================================================
   STORAGE (localStorage-based, works in any browser including Vercel deploy)
================================================================ */
const _storage = {
  async get(key) {
    try {
      const v = localStorage.getItem(key);
      return v !== null ? { value: v } : null;
    } catch (e) { return null; }
  },
  async set(key, value) {
    try {
      localStorage.setItem(key, value);
      return { value };
    } catch (e) {
      throw new Error('Storage failed: ' + (e.message || 'unknown'));
    }
  },
  async delete(key) {
    try {
      localStorage.removeItem(key);
      return { deleted: true };
    } catch (e) { return null; }
  },
  async list(prefix) {
    try {
      const keys = [];
      for (let i = 0; i < localStorage.length; i++) {
        const k = localStorage.key(i);
        if (k && k.startsWith(prefix)) keys.push(k);
      }
      return { keys };
    } catch (e) { return { keys: [] }; }
  }
};

async function loadSavedList() {
  try {
    const result = await _storage.list(STORAGE_PREFIX);
    return result?.keys || [];
  } catch (e) {
    return [];
  }
}

async function loadItinerary(key) {
  try {
    const result = await _storage.get(key);
    return result ? JSON.parse(result.value) : null;
  } catch (e) {
    return null;
  }
}

async function saveItinerary(itin) {
  const key = STORAGE_PREFIX + itin.id;
  try {
    await _storage.set(key, JSON.stringify(itin));
    return true;
  } catch (e) {
    alert('Could not save: ' + e.message);
    return false;
  }
}

async function deleteItinerary(key) {
  try {
    await _storage.delete(key);
    return true;
  } catch (e) {
    return false;
  }
}

function attachBuilderListeners() {
  // Top-level fields
  ['agency', 'contact', 'quoteNo', 'issueDate', 'validity', 'title', 'destination', 'nights', 'days', 'routeSummary', 'category', 'notes'].forEach(key => {
    const el = document.getElementById('f-' + key);
    if (el) el.addEventListener('input', () => {
      state[key] = el.value;
      renderPreview();
    });
  });

  // Inclusions/exclusions (split on newline)
  ['inclusions', 'exclusions'].forEach(key => {
    const el = document.getElementById('f-' + key);
    if (el) el.addEventListener('input', () => {
      state[key] = el.value.split('\n').map(s => s.trim()).filter(Boolean);
      renderPreview();
    });
  });

  // Day fields
  document.querySelectorAll('[data-day]').forEach(el => {
    el.addEventListener('input', () => {
      const idx = parseInt(el.dataset.day);
      const key = el.dataset.key;
      state.daysList[idx][key] = el.value;
      if (key === 'title') {
        const titleEl = el.closest('.day-card').querySelector('.day-card-title');
        if (titleEl) titleEl.textContent = el.value || 'Untitled Day';
      }
      renderPreview();
    });
  });

  // Day actions
  document.querySelectorAll('[data-action]').forEach(btn => {
    btn.addEventListener('click', () => {
      const action = btn.dataset.action;
      const i = parseInt(btn.dataset.i);
      if (action === 'up' && i > 0) {
        [state.daysList[i - 1], state.daysList[i]] = [state.daysList[i], state.daysList[i - 1]];
      } else if (action === 'down' && i < state.daysList.length - 1) {
        [state.daysList[i + 1], state.daysList[i]] = [state.daysList[i], state.daysList[i + 1]];
      } else if (action === 'del') {
        if (state.daysList.length > 1) {
          state.daysList.splice(i, 1);
        } else {
          alert('At least one day is required.');
          return;
        }
      }
      renderBuilder();
      renderPreview();
    });
  });

  // Add day
  const addDayBtn = document.getElementById('btn-add-day');
  if (addDayBtn) addDayBtn.addEventListener('click', () => {
    state.daysList.push({ route: '', title: 'New Day', stay: '', desc: '', meals: 'Breakfast · Dinner' });
    renderBuilder();
    renderPreview();
  });

  // Hotel fields
  document.querySelectorAll('[data-hotel]').forEach(el => {
    el.addEventListener('input', () => {
      const idx = parseInt(el.dataset.hotel);
      const key = el.dataset.key;
      state.hotels[idx][key] = el.value;
      if (key === 'city') {
        const titleEl = el.closest('.day-card').querySelector('.day-card-title');
        if (titleEl) titleEl.textContent = el.value || 'Destination';
      }
      renderPreview();
    });
  });

  // Hotel delete
  document.querySelectorAll('[data-hotel-action]').forEach(btn => {
    btn.addEventListener('click', () => {
      const i = parseInt(btn.dataset.i);
      if (state.hotels.length > 1) {
        state.hotels.splice(i, 1);
        renderBuilder();
        renderPreview();
      } else {
        alert('At least one destination row is required.');
      }
    });
  });

  // Add hotel
  const addHotelBtn = document.getElementById('btn-add-hotel');
  if (addHotelBtn) addHotelBtn.addEventListener('click', () => {
    state.hotels.push({ city: 'New Destination', nights: '', star3: '', star4: '', star5: '' });
    renderBuilder();
    renderPreview();
  });

  // Pricing fields (simplified — pax, rooms, total)
  ['pax', 'rooms', 'total'].forEach(key => {
    const el = document.getElementById('f-' + key);
    if (el) el.addEventListener('input', () => {
      state.pricing[key] = el.value;
      renderPreview();
    });
  });
}

================================================================ */
async function refreshSavedList() {
  const ul = document.getElementById('saved-list');
  const keys = await loadSavedList();
  if (!keys.length) {
    ul.innerHTML = '<li class="saved-empty">No saved itineraries yet. Build one and click Save.</li>';
    return;
  }

  const items = [];
  for (const key of keys) {
    const itin = await loadItinerary(key);
    if (itin) items.push({ key, itin });
  }
  items.sort((a, b) => (b.itin.id || '').localeCompare(a.itin.id || ''));

  ul.innerHTML = items.map(({ key, itin }) => `
    <li class="saved-item" data-key="${escapeAttr(key)}">
      <div class="saved-item-title">${escapeHtml(itin.title || 'Untitled')}</div>
      <div class="saved-item-meta">${escapeHtml(itin.nights || '?')}N/${escapeHtml(itin.days || '?')}D · ${escapeHtml(itin.agency || 'No agency')}</div>
      <button class="saved-item-delete" data-del-key="${escapeAttr(key)}" title="Delete">✕</button>
    </li>
  `).join('');

  ul.querySelectorAll('.saved-item').forEach(li => {
    li.addEventListener('click', async (e) => {
      if (e.target.closest('.saved-item-delete')) return;
      const key = li.dataset.key;
      const itin = await loadItinerary(key);
      if (itin) {
        state = itin;
        activeItineraryId = key;
        renderBuilder();
        renderPreview();
        showFeedback('✓ Loaded: ' + (itin.title || 'Untitled'));
      }
    });
  });

  ul.querySelectorAll('[data-del-key]').forEach(btn => {
    btn.addEventListener('click', async (e) => {
      e.stopPropagation();
      const key = btn.dataset.delKey;
      if (confirm('Delete this itinerary permanently?')) {
        await deleteItinerary(key);
        await refreshSavedList();
        showFeedback('✓ Deleted');
      }
    });
  });
}

function renderTemplates() {

/* ================================================================
   COPY TO CLIPBOARD
================================================================ */
async function copyRichHTML() {
  const html = buildEmailHTML();
  const plain = buildPlainText();
  try {
    if (navigator.clipboard && window.ClipboardItem) {
      const blob = new Blob([html], { type: 'text/html' });
      const plainBlob = new Blob([plain], { type: 'text/plain' });
      await navigator.clipboard.write([
        new ClipboardItem({ 'text/html': blob, 'text/plain': plainBlob })
      ]);
      showFeedback('✓ Rich email copied — paste into Gmail');
    } else {
      throw new Error('Clipboard API unavailable');
    }
  } catch (e) {
    // Fallback: select preview content and copy
    const el = document.getElementById('preview-content');
    const range = document.createRange();
    range.selectNodeContents(el);
    const sel = window.getSelection();
    sel.removeAllRanges();
    sel.addRange(range);
    document.execCommand('copy');
    sel.removeAllRanges();
    showFeedback('✓ Copied (fallback method)');
  }
}

async function copyPlainText() {
  try {
    await navigator.clipboard.writeText(buildPlainText());
    showFeedback('✓ Plain text copied');
  } catch (e) {
    alert('Could not copy. Please select manually.');
  }
}

function showFeedback(msg) {
  const el = document.getElementById('copy-feedback');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2200);
}

function escapeHtml(str) {
  if (str === undefined || str === null) return '';
  return String(str).replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
}
function escapeAttr(str) { return escapeHtml(str); }

async function copyInvoiceRichHTML() {
  const html = buildInvoiceHTML();
  const plain = buildInvoicePlainText();
  try {
    if (navigator.clipboard && window.ClipboardItem) {
      const blob = new Blob([html], { type: 'text/html' });
      const plainBlob = new Blob([plain], { type: 'text/plain' });
      await navigator.clipboard.write([new ClipboardItem({ 'text/html': blob, 'text/plain': plainBlob })]);
      showFeedback('✓ Invoice copied — paste into Gmail');
    } else { throw new Error('Clipboard API unavailable'); }
  } catch (e) {
    const el = document.getElementById('preview-content');
    const range = document.createRange();
    range.selectNodeContents(el);
    const sel = window.getSelection();
    sel.removeAllRanges();
    sel.addRange(range);
    document.execCommand('copy');
    sel.removeAllRanges();
    showFeedback('✓ Copied (fallback)');
  }
}

async function copyInvoicePlainText() {
  try {
    await navigator.clipboard.writeText(buildInvoicePlainText());
    showFeedback('✓ Plain text copied');
  } catch (e) {
    alert('Could not copy.');
  }
}

/* ============ HELPER: Format time elapsed ============ */
function formatElapsed(isoString) {
  if (!isoString) return '—';
  const elapsed = Date.now() - new Date(isoString).getTime();
  const mins = Math.floor(elapsed / 60000);
  const hours = Math.floor(mins / 60);
  const days = Math.floor(hours / 24);
  if (mins < 1) return 'just now';
  if (mins < 60) return mins + ' min ago';
  if (hours < 24) return hours + ' hr ago';
  if (days < 7) return days + ' day' + (days > 1 ? 's' : '') + ' ago';
  return Math.floor(days / 7) + 'w ago';
}

function getResponseUrgency(query) {
  if (query.status === 'responded' || query.status === 'closed') return { color: '#27ae60', label: '✓ Done' };
  const elapsed = Date.now() - new Date(query.createdAt).getTime();
  const hours = elapsed / (1000 * 60 * 60);
  if (hours < 2) return { color: '#27ae60', label: '🟢 Fresh' };
  if (hours < 6) return { color: '#f39c12', label: '🟡 Today' };
  if (hours < 24) return { color: '#e67e22', label: '🟠 Urgent' };
  return { color: '#c0392b', label: '🔴 Overdue' };
}

  return QUERY_PIPELINE.find(s => s.key === key) || QUERY_PIPELINE[0];

function advanceQueryStatus(query, newStatus, note) {
  if (!query.statusHistory) query.statusHistory = [];
  query.statusHistory.push({
    status: newStatus,
    at: new Date().toISOString(),
    note: note || ''
  });
  query.status = newStatus;
  if (newStatus === 'quote_sent' && !query.respondedAt) {
    query.respondedAt = new Date().toISOString();
  }
}

function renderCostBreakdown(q, hotels) {
  // Calculate hotel costs
  let hotelTotal = 0;
  q.selectedHotels.forEach(sh => {
    const rate = Number(sh.rate) || 0;
    const nights = Number(sh.nights) || 0;
    hotelTotal += rate * nights;
  });
  // Multiply by rooms (approximation: number of double rooms or default 1)
  const rooms = Number(q.rooms) || 1;
  // We assume rate is per-room, so multiply by rooms count
  // Actually let's keep it simple: rate × nights = cost for those rooms
  const transport = Number(q.transportCost) || 0;
  const sightseeing = Number(q.sightseeingCost) || 0;
  const misc = Number(q.miscCost) || 0;
  const subtotalINR = hotelTotal + transport + sightseeing + misc;
  const markupPct = Number(q.markupPercent) || 0;
  const markupAmount = (subtotalINR * markupPct) / 100;
  const totalINR = subtotalINR + markupAmount;
  const fxRate = Number(q.fxRate) || 1;
  const totalConverted = totalINR * fxRate;
  const cur = CURRENCIES[q.targetCurrency] || CURRENCIES.INR;
  const fmtINR = (v) => '₹ ' + Math.round(v).toLocaleString('en-IN');
  const fmtTarget = (v) => cur.symbol + ' ' + Number(v).toLocaleString(cur.locale, { minimumFractionDigits: 2, maximumFractionDigits: 2 });

  return `
    <div style="background: var(--brand-magenta-light); padding: 12px 14px; margin-top: 12px; border-left: 3px solid var(--brand-magenta);">
      <div style="font-size: 10px; letter-spacing: 2px; color: var(--brand-magenta); font-weight: 700; text-transform: uppercase; margin-bottom: 8px;">💰 Cost Breakdown (Internal Working)</div>
      <table style="width: 100%; font-size: 11.5px;">
        <tr><td style="padding: 3px 0; color: var(--ink-soft);">Hotels (${q.selectedHotels.length}):</td><td style="text-align: right; font-weight: 600;">${fmtINR(hotelTotal)}</td></tr>
        ${transport > 0 ? `<tr><td style="padding: 3px 0; color: var(--ink-soft);">Transport:</td><td style="text-align: right;">${fmtINR(transport)}</td></tr>` : ''}
        ${sightseeing > 0 ? `<tr><td style="padding: 3px 0; color: var(--ink-soft);">Sightseeing:</td><td style="text-align: right;">${fmtINR(sightseeing)}</td></tr>` : ''}
        ${misc > 0 ? `<tr><td style="padding: 3px 0; color: var(--ink-soft);">Miscellaneous:</td><td style="text-align: right;">${fmtINR(misc)}</td></tr>` : ''}
        <tr><td style="padding: 4px 0; color: var(--ink-soft); border-top: 1px solid var(--line); padding-top: 6px;"><strong>Subtotal (Net Cost):</strong></td><td style="text-align: right; font-weight: 700; border-top: 1px solid var(--line); padding-top: 6px;">${fmtINR(subtotalINR)}</td></tr>
        ${markupPct > 0 ? `<tr><td style="padding: 3px 0; color: var(--ink-soft);">+ Markup (${markupPct}%):</td><td style="text-align: right; color: var(--brand-magenta);">${fmtINR(markupAmount)}</td></tr>` : ''}
        <tr><td style="padding: 6px 0; background: var(--brand-magenta); color: white; padding-left: 10px; font-weight: 700; letter-spacing: 1px;">SELLING PRICE (INR):</td><td style="text-align: right; padding: 6px 10px; background: var(--brand-magenta); color: white; font-weight: 700; font-size: 14px;">${fmtINR(totalINR)}</td></tr>
        ${q.targetCurrency !== 'INR' && fxRate !== 1 ? `<tr><td style="padding: 6px 0; background: var(--brand-gold); color: var(--ink); padding-left: 10px; font-weight: 700; letter-spacing: 1px;">SELLING PRICE (${cur.code}):</td><td style="text-align: right; padding: 6px 10px; background: var(--brand-gold); color: var(--ink); font-weight: 700; font-size: 14px;">${fmtTarget(totalConverted)}</td></tr>` : ''}
      </table>
    </div>
  `;
}

function attachQueryHubListeners(hotels, replyTpls) {
  // Top-level fields
  const fields = ['rawInquiry', 'agentName', 'agentCompany', 'agentEmail', 'agentPhone',
    'destination', 'travelStart', 'travelEnd', 'nights', 'paxAdults', 'paxChildren', 'rooms',
    'targetCurrency', 'transportCost', 'sightseeingCost', 'miscCost', 'markupPercent', 'fxRate',
    'response', 'notes'];

  fields.forEach(key => {
    const el = document.getElementById('qry-' + key);
    if (!el) return;
    el.addEventListener('input', () => {
      queryState[key] = el.value;
      // Only re-render builder for fields that affect calc breakdown
      if (['transportCost', 'sightseeingCost', 'miscCost', 'markupPercent', 'fxRate', 'targetCurrency', 'rooms'].includes(key)) {
        renderQueryHub();
      }
    });
    if (el.tagName === 'SELECT') {
      el.addEventListener('change', () => {
        queryState[key] = el.value;
        renderQueryHub();
      });
    }
  });

  // Parse inquiry
  const parseBtn = document.getElementById('qry-parse');
  if (parseBtn) parseBtn.addEventListener('click', () => {
    if (!queryState.rawInquiry || !queryState.rawInquiry.trim()) {
      alert('Paste an inquiry first.');
      return;
    }
    const extracted = parseInquiry(queryState.rawInquiry);
    if (!extracted) return;
    let count = 0;
    // Map parser fields to query fields
    const map = {
      agentEmail: 'agentEmail', agentPhone: 'agentPhone', agentName: 'agentName',
      agentCompany: 'agentCompany', destination: 'destination', nights: 'nights',
      paxAdults: 'paxAdults', paxChildren: 'paxChildren', travelStart: 'travelStart'
    };
    Object.entries(map).forEach(([src, dest]) => {
      if (extracted[src] && !queryState[dest]) {
        queryState[dest] = extracted[src];
        count++;
      }
    });
    renderQueryHub();
    showFeedback('✓ Parsed ' + count + ' field' + (count === 1 ? '' : 's'));
  });

  // Hotel picker
  const addPickedBtn = document.getElementById('qry-add-picked-hotel');
  if (addPickedBtn) addPickedBtn.addEventListener('click', () => {
    const picker = document.getElementById('qry-hotel-picker');
    if (!picker.value) { alert('Pick a hotel from the dropdown first.'); return; }
    const hotel = hotels.find(h => h.id === picker.value);
    if (!hotel) return;
    queryState.selectedHotels.push({
      hotelId: hotel.id,
      nights: queryState.nights || 1,
      mealPlan: 'CP (Bed + Breakfast)',
      rate: hotel.baseRate || ''
    });
    renderQueryHub();
    showFeedback('✓ Added: ' + hotel.name);
  });

  // Selected hotel row inputs
  document.querySelectorAll('[data-sh]').forEach(el => {
    el.addEventListener('input', () => {
      const idx = parseInt(el.dataset.sh);
      const key = el.dataset.key;
      queryState.selectedHotels[idx][key] = el.value;
      renderQueryHub();
    });
    if (el.tagName === 'SELECT') {
      el.addEventListener('change', () => {
        const idx = parseInt(el.dataset.sh);
        const key = el.dataset.key;
        queryState.selectedHotels[idx][key] = el.value;
      });
    }
  });

  // Remove selected hotel
  document.querySelectorAll('[data-sh-del]').forEach(btn => {
    btn.addEventListener('click', () => {
      const idx = parseInt(btn.dataset.shDel);
      queryState.selectedHotels.splice(idx, 1);
      renderQueryHub();
    });
  });

  // Show hotel form
  const showFormBtn = document.getElementById('qry-show-hotel-form');
  if (showFormBtn) showFormBtn.addEventListener('click', () => {
    const container = document.getElementById('qry-hotel-form-container');
    container.style.display = container.style.display === 'none' ? 'block' : 'none';
    attachHotelFormListeners();
  });

  // FX rate quick button (INR reset)
  const fxBtn = document.getElementById('qry-fetch-fx');
  if (fxBtn) fxBtn.addEventListener('click', () => {
    queryState.fxRate = '1';
    queryState.targetCurrency = 'INR';
    renderQueryHub();
  });

  // Reply templates
  document.querySelectorAll('[data-reply-tpl]').forEach(btn => {
    btn.addEventListener('click', () => {
      const tplId = btn.dataset.replyTpl;
      const tpl = replyTpls.find(t => t.id === tplId);
      if (!tpl) return;
      // Replace placeholders
      let body = tpl.body;
      const fx = Number(queryState.fxRate) || 1;
      const cur = CURRENCIES[queryState.targetCurrency] || CURRENCIES.INR;
      const totalPax = (Number(queryState.paxAdults) || 0) + (Number(queryState.paxChildren) || 0);
      const replacements = {
        '{{agent}}': queryState.agentName || queryState.agentCompany || 'Partner',
        '{{destination}}': queryState.destination || '[destination]',
        '{{pax}}': totalPax || '[pax]',
        '{{nights}}': queryState.nights || '[nights]',
        '{{travelDates}}': (queryState.travelStart || '[start]') + ' to ' + (queryState.travelEnd || '[end]'),
        '{{hours}}': '4',
        '{{holdDate}}': new Date(Date.now() + 48*60*60*1000).toISOString().split('T')[0],
        '{{quoteDate}}': new Date(queryState.createdAt).toISOString().split('T')[0],
        '{{rates}}': generateRateSummary(queryState, hotels),
        '{{hotels}}': queryState.selectedHotels.map(sh => {
          const h = hotels.find(x => x.id === sh.hotelId);
          return h ? h.name : '';
        }).filter(Boolean).join(', ') || '[hotels]',
        '{{amount}}': cur.symbol + ' ' + calculateTotalPrice(queryState).toFixed(2)
      };
      Object.entries(replacements).forEach(([k, v]) => {
        body = body.replace(new RegExp(k.replace(/[{}]/g, '\\$&'), 'g'), v);
      });
      queryState.response = body;
      renderQueryHub();
      showFeedback('✓ Template loaded — edit as needed');
    });
  });

  // Copy response
  const copyBtn = document.getElementById('qry-copy-response');
  if (copyBtn) copyBtn.addEventListener('click', async () => {
    try {
      await navigator.clipboard.writeText(queryState.response || '');
      showFeedback('✓ Response copied to clipboard');
    } catch (e) { alert('Could not copy. Select manually.'); }
  });

  // Mark responded
  const respBtn = document.getElementById('qry-mark-responded');
  if (respBtn) respBtn.addEventListener('click', () => {
    advanceQueryStatus(queryState, 'quote_sent', 'Marked as quote sent');
    saveQuery(queryState);
    renderQueryHub();
    refreshQueriesList();
    showFeedback('✓ Marked as Quote Sent');
  });

  // Status pipeline buttons
  document.querySelectorAll('[data-set-status]').forEach(btn => {
    btn.addEventListener('click', () => {
      const newStatus = btn.dataset.setStatus;
      if (newStatus === queryState.status) return;
      advanceQueryStatus(queryState, newStatus);
      saveQuery(queryState);
      renderQueryHub();
      refreshQueriesList();
      showFeedback('✓ Status: ' + getQueryStage(newStatus).label);
    });
  });

  // Lost reason
  const lostEl = document.getElementById('qry-lostReason');
  if (lostEl) lostEl.addEventListener('input', () => {
    queryState.lostReason = lostEl.value;
  });

  // Revise quote
  const reviseBtn = document.getElementById('qry-revise');
  if (reviseBtn) reviseBtn.addEventListener('click', () => {
    const choice = prompt('Revise as:\n\n1 = New version (keep history)\n2 = Overwrite current\n\nEnter 1 or 2:', '1');
    if (choice !== '1' && choice !== '2') return;
    const totalPrice = calculateTotalPrice(queryState);
    const note = prompt('Revision note (optional):', '') || '';
    if (choice === '1') {
      // Save current as a version snapshot, then continue editing
      if (!queryState.versions) queryState.versions = [];
      queryState.versions.push({
        at: new Date().toISOString(),
        totalPrice: totalPrice,
        note: note,
        snapshot: JSON.parse(JSON.stringify({
          selectedHotels: queryState.selectedHotels,
          transportCost: queryState.transportCost,
          sightseeingCost: queryState.sightseeingCost,
          miscCost: queryState.miscCost,
          markupPercent: queryState.markupPercent
        }))
      });
      showFeedback('✓ Snapshot v' + queryState.versions.length + ' saved. Edit and save again.');
    } else {
      // Overwrite — just log it
      if (!queryState.versions) queryState.versions = [];
      queryState.versions = [{ at: new Date().toISOString(), totalPrice: totalPrice, note: note + ' (overwrite)' }];
      showFeedback('✓ Marked as overwritten — edit now');
    }
    saveQuery(queryState);
    renderQueryHub();
  });

  // Word exports
  const wordBrandedBtn = document.getElementById('qry-word-branded');
  if (wordBrandedBtn) wordBrandedBtn.addEventListener('click', () => exportQueryAsWord(false, hotels));
  const wordWhiteLabelBtn = document.getElementById('qry-word-whitelabel');
  if (wordWhiteLabelBtn) wordWhiteLabelBtn.addEventListener('click', () => exportQueryAsWord(true, hotels));

  // Convert to itinerary
  const toItinBtn = document.getElementById('qry-to-itin');
  if (toItinBtn) toItinBtn.addEventListener('click', () => convertQueryToItinerary(hotels));

  // Convert to invoice
  const toInvBtn = document.getElementById('qry-to-inv');
  if (toInvBtn) toInvBtn.addEventListener('click', () => convertQueryToInvoice(hotels));
}

function generateRateSummary(q, hotels) {
  if (q.selectedHotels.length === 0) return '[rates to be added]';
  return q.selectedHotels.map(sh => {
    const h = hotels.find(x => x.id === sh.hotelId);
    if (!h) return '';
    return `• ${h.name} (${h.city}, ${h.category}) — ${sh.nights} nights · ${sh.mealPlan}`;
  }).filter(Boolean).join('\n');
}

function calculateTotalPrice(q) {
  let hotelTotal = 0;
  q.selectedHotels.forEach(sh => {
    hotelTotal += (Number(sh.rate) || 0) * (Number(sh.nights) || 0);
  });
  const subtotalINR = hotelTotal + (Number(q.transportCost) || 0) + (Number(q.sightseeingCost) || 0) + (Number(q.miscCost) || 0);
  const markupPct = Number(q.markupPercent) || 0;
  const totalINR = subtotalINR * (1 + markupPct / 100);
  const fxRate = Number(q.fxRate) || 1;
  return totalINR * fxRate;
}

function convertQueryToItinerary(hotels) {
  state = createBlankItinerary();
  state.id = 'itin_' + Date.now();
  state.agency = queryState.agentCompany || queryState.agentName;
  state.contact = queryState.agentName;
  state.destination = queryState.destination || 'Kashmir';
  state.routeSummary = queryState.destination;
  if (queryState.nights) state.nights = Number(queryState.nights);
  if (queryState.nights) state.days = Number(queryState.nights) + 1;
  state.title = (queryState.destination || 'Kashmir') + ' ' + (state.nights || '') + 'N/' + (state.days || '') + 'D — ' + (queryState.agentCompany || queryState.agentName || 'Untitled');
  // Pre-fill hotels from query
  if (queryState.selectedHotels.length > 0) {
    state.hotels = queryState.selectedHotels.map(sh => {
      const h = hotels.find(x => x.id === sh.hotelId);
      return {
        city: h ? h.city : '',
        nights: sh.nights + ' Nights',
        star3: '', star4: '', star5: h ? h.name : ''
      };
    });
  }
  // Save query as responded
  queryState.status = 'responded';
  queryState.respondedAt = new Date().toISOString();
  saveQuery(queryState);
  switchModule('itinerary');
  showFeedback('✓ Query → Itinerary');
}

function convertQueryToInvoice(hotels) {
  invoiceState = createBlankInvoice();
  invoiceState.id = 'inv_' + Date.now();
  invoiceState.clientType = 'B2B';
  invoiceState.clientName = queryState.agentCompany || queryState.agentName;
  invoiceState.clientEmail = queryState.agentEmail;
  invoiceState.clientPhone = queryState.agentPhone;
  invoiceState.destination = queryState.destination;
  invoiceState.travelStart = queryState.travelStart;
  invoiceState.travelEnd = queryState.travelEnd;
  const totalPax = (Number(queryState.paxAdults) || 0) + (Number(queryState.paxChildren) || 0);
  if (totalPax) invoiceState.paxCount = totalPax + ' Pax';
  invoiceState.currency = queryState.targetCurrency || 'INR';
  // Pre-fill with hotel line items + transport
  const items = [];
  queryState.selectedHotels.forEach(sh => {
    const h = hotels.find(x => x.id === sh.hotelId);
    if (!h) return;
    const totalCost = (Number(sh.rate) || 0) * (Number(sh.nights) || 0);
    items.push({
      desc: h.name + ' (' + h.city + ', ' + h.category + ') — ' + sh.nights + 'N · ' + sh.mealPlan,
      qty: sh.nights,
      rate: sh.rate || '',
      amount: totalCost.toFixed(2),
      amountManual: false
    });
  });
  if (queryState.transportCost) {
    items.push({ desc: 'Private transport — vehicles, fuel, driver', qty: 1, rate: queryState.transportCost, amount: '0.00', amountManual: false });
  }
  if (queryState.sightseeingCost) {
    items.push({ desc: 'Sightseeing & activities', qty: 1, rate: queryState.sightseeingCost, amount: '0.00', amountManual: false });
  }
  if (queryState.miscCost) {
    items.push({ desc: 'Miscellaneous & taxes', qty: 1, rate: queryState.miscCost, amount: '0.00', amountManual: false });
  }
  if (items.length > 0) invoiceState.items = items;

  queryState.status = 'responded';
  queryState.respondedAt = new Date().toISOString();
  saveQuery(queryState);
  switchModule('invoice');
  showFeedback('✓ Query → Invoice');
}

    });
    html += `</table>`;
  }

  // Total price callout
  if (totalPrice > 0) {
    html += `<div style="background: #7c236a; color: white; padding: 12px 14px; margin-top: 14px; text-align: center;">
      <div style="font-size: 9px; letter-spacing: 2.5px; font-weight: 700; opacity: 0.85;">QUOTED PRICE</div>
      <div style="font-size: 22px; font-weight: 700; margin-top: 4px;">${cur.symbol} ${totalPrice.toLocaleString(cur.locale, { minimumFractionDigits: 2, maximumFractionDigits: 2 })}</div>

  }

  // Response draft
  if (q.response) {
    html += `<div style="margin-top: 14px;">
      <div style="font-size: 9px; letter-spacing: 1.5px; color: #ba9c62; font-weight: 700; text-transform: uppercase; margin-bottom: 6px;">📧 DRAFT RESPONSE</div>

    </div>`;
  }

  html += '</div>';
  el.innerHTML = html;
}

async function refreshQueriesList() {
  const ul = document.getElementById('saved-list');
  if (!ul) return;
  const queries = await loadAllQueries();
  if (!queries.length) {
    ul.innerHTML = '<li class="saved-empty">No B2B queries yet. Click + New to create one.</li>';
    return;
  }
  queries.sort((a, b) => (b.createdAt || '').localeCompare(a.createdAt || ''));
  ul.innerHTML = queries.map(q => {
    const urgency = getResponseUrgency(q);
    return `
      <li class="saved-item" data-query-key="${QUERY_STORAGE_PREFIX + q.id}" style="border-left-color: ${urgency.color};">
        <div class="saved-item-title">${escapeHtml(q.agentName || q.agentCompany || 'Unnamed')}</div>
        <div class="saved-item-meta">${urgency.label} · ${escapeHtml(q.destination || '—')} · ${formatElapsed(q.createdAt)}</div>
        <button class="saved-item-delete" data-query-del-key="${q.id}" title="Delete">✕</button>
      </li>
    `;
  }).join('');

  ul.querySelectorAll('.saved-item').forEach(li => {
    li.addEventListener('click', async (e) => {
      if (e.target.closest('.saved-item-delete')) return;
      const key = li.dataset.queryKey;
      const q = await loadQuery(key);
      if (q) {
        queryState = q;
        activeQueryId = key;
        renderQueryHub();
        renderQueryHubPreview();
        showFeedback('✓ Loaded query');
      }
    });
  });
  ul.querySelectorAll('[data-query-del-key]').forEach(btn => {
    btn.addEventListener('click', async (e) => {
      e.stopPropagation();
      const id = btn.dataset.queryDelKey;
      if (confirm('Delete this query?')) {
        await deleteQuery(id);
        await refreshQueriesList();
        showFeedback('✓ Deleted');
      }
    });
  });
}

let dashboardFilter = 'thisMonth';
let dashCustomStart = '';
let dashCustomEnd = '';

function getDateRange(filter) {
  const now = new Date();
  const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  if (filter === 'thisMonth') {
    return {
      start: new Date(now.getFullYear(), now.getMonth(), 1),
      end: new Date(now.getFullYear(), now.getMonth() + 1, 0, 23, 59, 59),
      label: 'This Month'
    };
  }
  if (filter === 'lastMonth') {
    return {
      start: new Date(now.getFullYear(), now.getMonth() - 1, 1),
      end: new Date(now.getFullYear(), now.getMonth(), 0, 23, 59, 59),
      label: 'Last Month'
    };
  }
  if (filter === 'thisYear') {
    return {
      start: new Date(now.getFullYear(), 0, 1),
      end: new Date(now.getFullYear(), 11, 31, 23, 59, 59),
      label: 'This Year (' + now.getFullYear() + ')'
    };
  }
  if (filter === 'custom') {
    return {
      start: dashCustomStart ? new Date(dashCustomStart) : new Date(2000, 0, 1),
      end: dashCustomEnd ? new Date(dashCustomEnd + 'T23:59:59') : new Date(2099, 11, 31),
      label: 'Custom: ' + (dashCustomStart || '...') + ' to ' + (dashCustomEnd || '...')
    };
  }
  if (filter === 'allTime') {
    return { start: new Date(2000, 0, 1), end: new Date(2099, 11, 31), label: 'All Time' };
  }
  return { start: new Date(2000, 0, 1), end: new Date(2099, 11, 31), label: 'All Time' };
}

async function renderDashboard() {
  const el = document.getElementById('builder');
  const range = getDateRange(dashboardFilter);

  // Load all data
  const queries = await loadAllQueries();
  const invoices = [];
  const invKeys = await loadInvoiceList();
  for (const k of invKeys) {
    const inv = await loadInvoice(k);
    if (inv) invoices.push(inv);
  }
  const itinKeys = await loadSavedList();
  const itineraries = [];
  for (const k of itinKeys) {
    const itin = await loadItinerary(k);
    if (itin) itineraries.push(itin);
  }

  // Filter by date range
  const inRange = (isoString) => {
    if (!isoString) return false;
    const d = new Date(isoString);
    return d >= range.start && d <= range.end;
  };
  const qInRange = queries.filter(q => inRange(q.createdAt));

  // Calculate metrics
  const totalReceived = qInRange.length;
  const quoteSent = qInRange.filter(q => ['quote_sent', 'negotiating', 'confirmed', 'completed'].includes(q.status)).length;
  const confirmed = qInRange.filter(q => ['confirmed', 'completed'].includes(q.status)).length;
  const completed = qInRange.filter(q => q.status === 'completed').length;
  const lost = qInRange.filter(q => q.status === 'lost').length;
  const negotiating = qInRange.filter(q => q.status === 'negotiating').length;
  const conversionRate = totalReceived > 0 ? ((confirmed / totalReceived) * 100).toFixed(1) : '0.0';
  const quoteResponseRate = totalReceived > 0 ? ((quoteSent / totalReceived) * 100).toFixed(1) : '0.0';

  // Revenue (sum of confirmed query expected values + invoiced amounts)
  let totalRevenue = 0;
  const currencyTotals = { INR: 0, USD: 0, EUR: 0, MUR: 0, MYR: 0 };
  qInRange.filter(q => ['confirmed', 'completed'].includes(q.status)).forEach(q => {
    const price = calculateTotalPrice(q);
    if (q.targetCurrency && currencyTotals[q.targetCurrency] !== undefined) {
      currencyTotals[q.targetCurrency] += price;
    }
    totalRevenue += price * (Number(q.fxRate) || 1);
  });

  // Response time avg (hours from received to quote_sent)
  const responseTimes = qInRange.filter(q => q.respondedAt).map(q => {
    return (new Date(q.respondedAt) - new Date(q.createdAt)) / (1000 * 60 * 60);
  });
  const avgResponseHours = responseTimes.length > 0
    ? (responseTimes.reduce((a, b) => a + b, 0) / responseTimes.length).toFixed(1)
    : '—';

  // Top destinations
  const destCounts = {};
  qInRange.forEach(q => {
    const d = (q.destination || 'Unspecified').trim();
    destCounts[d] = (destCounts[d] || 0) + 1;
  });
  const topDestinations = Object.entries(destCounts).sort((a, b) => b[1] - a[1]).slice(0, 5);

  // Top agents
  const agentCounts = {};
  qInRange.forEach(q => {
    const a = (q.agentCompany || q.agentName || 'Unknown').trim();
    if (!agentCounts[a]) agentCounts[a] = { total: 0, confirmed: 0 };
    agentCounts[a].total++;
    if (['confirmed', 'completed'].includes(q.status)) agentCounts[a].confirmed++;
  });
  const topAgents = Object.entries(agentCounts).sort((a, b) => b[1].total - a[1].total).slice(0, 5);

  // Lost reasons
  const lostReasons = {};
  qInRange.filter(q => q.status === 'lost' && q.lostReason).forEach(q => {
    lostReasons[q.lostReason] = (lostReasons[q.lostReason] || 0) + 1;
  });

  el.innerHTML = `

      <p>${escapeHtml(range.label)} · Live conversion analytics</p>
    </div>

    <!-- Filter pills -->
    <div class="section" style="margin-bottom: 14px;">
      <div class="section-body" style="padding: 12px;">
        <div style="display: flex; gap: 6px; flex-wrap: wrap; align-items: center;">
          ${[
            { key: 'thisMonth', label: 'This Month' },

            { key: 'custom', label: 'Custom Range' }
          ].map(f => `
            <button data-dash-filter="${f.key}" class="${dashboardFilter === f.key ? '' : 'nav-btn'}" style="padding: 7px 14px; font-size: 11px; letter-spacing: 1.5px; cursor: pointer; text-transform: uppercase; font-weight: 600; border: 1px solid ${dashboardFilter === f.key ? 'var(--brand-magenta)' : 'var(--line)'}; background: ${dashboardFilter === f.key ? 'var(--brand-magenta)' : 'white'}; color: ${dashboardFilter === f.key ? 'white' : 'var(--ink-soft)'}; font-family: inherit;">
              ${escapeHtml(f.label)}
            </button>
          `).join('')}
        </div>
        ${dashboardFilter === 'custom' ? `
          <div class="row" style="margin-top: 10px;">
            <div class="field"><label>From</label><input id="dash-startDate" type="date" value="${escapeAttr(dashCustomStart)}"/></div>
            <div class="field"><label>To</label><input id="dash-endDate" type="date" value="${escapeAttr(dashCustomEnd)}"/></div>
          </div>
        ` : ''}
      </div>
    </div>

    <!-- KPI Cards -->
    <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 10px; margin-bottom: 14px;">

/* ============ LEAD PARSER (heuristic email parsing) ============ */
function parseInquiry(text) {
  if (!text || !text.trim()) return null;
  const extracted = {};
  const t = text.replace(/\r/g, '').trim();
  const lower = t.toLowerCase();

  // Email
  const emailMatch = t.match(/[\w.+-]+@[\w-]+\.[\w.-]+/);
  if (emailMatch) extracted.agentEmail = emailMatch[0];

  // Phone — match international and Indian formats
  const phoneMatch = t.match(/(?:\+\d{1,3}[\s-]?)?(?:\(?\d{2,4}\)?[\s-]?)?\d{3,4}[\s-]?\d{3,4}[\s-]?\d{0,4}/);
  if (phoneMatch && phoneMatch[0].replace(/\D/g, '').length >= 8) extracted.agentPhone = phoneMatch[0].trim();

  // Destination keywords
  const destinations = ['kashmir', 'srinagar', 'gulmarg', 'pahalgam', 'sonamarg', 'ladakh', 'leh', 'pangong', 'nubra', 'maldives', 'goa', 'kerala', 'rajasthan', 'manali', 'shimla', 'dubai', 'mauritius', 'bali', 'thailand', 'singapore'];
  const destFound = destinations.filter(d => lower.includes(d));
  if (destFound.length) extracted.destination = destFound.map(d => d.charAt(0).toUpperCase() + d.slice(1)).join(' + ');

  // Nights / days
  const nightsMatch = t.match(/(\d{1,2})\s*(?:nights?|n)(?:\s*\/?\s*(\d{1,2})\s*days?|d)?/i);
  if (nightsMatch) extracted.nights = nightsMatch[1];

  // Pax (adults / children / total)
  const adultsMatch = t.match(/(\d{1,2})\s*(?:adults?|adt|pax)/i);
  if (adultsMatch) extracted.paxAdults = adultsMatch[1];
  const childrenMatch = t.match(/(\d{1,2})\s*(?:child|children|chd|kid)/i);
  if (childrenMatch) extracted.paxChildren = childrenMatch[1];
  // If only "X pax/people" found and no adults set
  if (!extracted.paxAdults) {
    const paxMatch = t.match(/(\d{1,2})\s*(?:pax|people|persons?|guests?)/i);
    if (paxMatch) extracted.paxAdults = paxMatch[1];
  }

  // Budget — match common currency-prefixed amounts
  const budgetMatch = t.match(/(?:budget|approx|around|about|₹|rs\.?|inr|usd|eur|\$|€)\s*[:\-]?\s*(\d[\d,]+)/i);
  if (budgetMatch) {
    extracted.budget = budgetMatch[1].replace(/,/g, '');
    if (lower.includes('usd') || t.includes('$')) extracted.budgetCurrency = 'USD';
    else if (lower.includes('eur') || t.includes('€')) extracted.budgetCurrency = 'EUR';
    else if (lower.includes('mur')) extracted.budgetCurrency = 'MUR';
  }

  // Travel dates — basic date patterns
  const dateMatch = t.match(/(\d{1,2}[\/-]\d{1,2}[\/-]\d{2,4})|(?:on|from)\s+(\d{1,2}\s+(?:jan|feb|mar|apr|may|jun|jul|aug|sep|oct|nov|dec)[a-z]*\s*\d{0,4})/i);
  if (dateMatch) extracted.travelStart = dateMatch[0].replace(/(on|from)\s+/i, '');

  // Sender name — try to find "From:" or "regards, X" or "Best, X"
  const fromMatch = t.match(/(?:from|sender)[:\s]+([A-Z][a-z]+(?:\s+[A-Z][a-z]+)*)/);
  const regardsMatch = t.match(/(?:regards|thanks|best|sincerely|cheers)[,\s]+([A-Z][a-z]+(?:\s+[A-Z][a-z]+){0,2})/i);
  if (fromMatch) extracted.agentName = fromMatch[1];
  else if (regardsMatch) extracted.agentName = regardsMatch[1];

  // Company name — common patterns
  const companyMatch = t.match(/([A-Z][a-zA-Z]+(?:\s+[A-Z][a-zA-Z]+){0,3})\s+(?:Travels?|Tours?|Holidays?|Agency|Pvt\.?\s*Ltd|LLC|Inc|GmbH|SARL)/);
  if (companyMatch) extracted.agentCompany = companyMatch[0];

  return extracted;
}

/* ============ LEAD STORAGE ============ */
async function saveLead(lead) {
  const key = LEAD_STORAGE_PREFIX + lead.id;
  try {
    await _storage.set(key, JSON.stringify(lead));
    return true;
  } catch (e) { alert('Save failed: ' + e.message); return false; }
}
async function loadLead(key) {
  try { const r = await _storage.get(key); return r ? JSON.parse(r.value) : null; } catch (e) { return null; }
}
async function deleteLead(key) {
  try { await _storage.delete(key); return true; } catch (e) { return false; }
}
async function loadAllLeads() {
  try {
    const r = await _storage.list(LEAD_STORAGE_PREFIX);
    const keys = r?.keys || [];
    const items = [];
    for (const k of keys) {
      const lead = await loadLead(k);
      if (lead) items.push(lead);
    }
    return items;
  } catch (e) { return []; }
}

function attachLeadListeners() {
  const fields = ['rawInquiry', 'status', 'source', 'nextAction', 'nextActionDate', 'agentName', 'agentCompany',
    'agentCountry', 'agentEmail', 'agentPhone', 'destination', 'travelStart', 'travelEnd', 'nights',
    'paxAdults', 'paxChildren', 'budget', 'budgetCurrency', 'requirements', 'notes'];
  fields.forEach(key => {
    const el = document.getElementById('lead-' + key);
    if (!el) return;
    el.addEventListener('input', () => {
      leadState[key] = el.value;
      renderLeadPreview();
    });
    if (el.tagName === 'SELECT') {
      el.addEventListener('change', () => {
        leadState[key] = el.value;
        renderLeadsBuilder();
        renderLeadPreview();
      });
    }
  });

  const parseBtn = document.getElementById('btn-parse-inquiry');
  if (parseBtn) parseBtn.addEventListener('click', () => {
    if (!leadState.rawInquiry || !leadState.rawInquiry.trim()) {
      alert('Paste an inquiry message first.');
      return;
    }
    const extracted = parseInquiry(leadState.rawInquiry);
    if (!extracted) { alert('Could not parse.'); return; }
    let count = 0;
    Object.keys(extracted).forEach(key => {
      if (extracted[key] && !leadState[key]) {
        leadState[key] = extracted[key];
        count++;
      }
    });
    renderLeadsBuilder();
    renderLeadPreview();
    showFeedback('✓ Parsed ' + count + ' field' + (count === 1 ? '' : 's'));
  });

  const toQuoteBtn = document.getElementById('btn-lead-to-quote');
  if (toQuoteBtn) toQuoteBtn.addEventListener('click', () => convertLeadToItinerary());

  const toInvBtn = document.getElementById('btn-lead-to-invoice');
  if (toInvBtn) toInvBtn.addEventListener('click', () => convertLeadToInvoice());
}

function convertLeadToItinerary() {
  // Clone lead data into a new itinerary
  state = createBlankItinerary();
  state.id = 'itin_' + Date.now();
  state.agency = leadState.agentCompany || leadState.agentName;
  state.contact = leadState.agentName;
  state.destination = leadState.destination || 'Kashmir';
  state.routeSummary = leadState.destination;
  if (leadState.nights) state.nights = Number(leadState.nights);
  if (leadState.nights) state.days = Number(leadState.nights) + 1;
  state.notes = leadState.requirements ? 'Special requirements: ' + leadState.requirements : '';
  state.title = (leadState.destination || 'Kashmir') + ' ' + (state.nights || '') + 'N/' + (state.days || '') + 'D — ' + (leadState.agentCompany || leadState.agentName || 'Untitled');

  // Save linkage
  leadState.linkedQuoteId = state.id;
  leadState.status = 'quote';
  saveLead(leadState);

  switchModule('itinerary');
  showFeedback('✓ Lead converted to itinerary — fill in days & save');
}

function convertLeadToInvoice() {
  invoiceState = createBlankInvoice();
  invoiceState.id = 'inv_' + Date.now();
  invoiceState.clientType = 'B2B';
  invoiceState.clientName = leadState.agentCompany || leadState.agentName;
  invoiceState.clientAddress = '';
  invoiceState.clientEmail = leadState.agentEmail;
  invoiceState.clientPhone = leadState.agentPhone;
  invoiceState.clientCountry = leadState.agentCountry;
  invoiceState.destination = leadState.destination;
  invoiceState.travelStart = leadState.travelStart;
  invoiceState.travelEnd = leadState.travelEnd;
  const totalPax = (Number(leadState.paxAdults) || 0) + (Number(leadState.paxChildren) || 0);
  if (totalPax) invoiceState.paxCount = totalPax + ' Pax';
  if (leadState.budgetCurrency) invoiceState.currency = leadState.budgetCurrency;
  if (leadState.destination) {
    invoiceState.items = [{
      desc: (leadState.destination || 'Tour') + ' Package' + (leadState.nights ? ' — ' + leadState.nights + 'N' : ''),
      qty: 1,
      rate: leadState.budget || '',
      amount: '0.00',
      amountManual: false
    }];
  }

  leadState.linkedInvoiceId = invoiceState.id;
  leadState.status = 'invoiced';
  saveLead(leadState);

  switchModule('invoice');
  showFeedback('✓ Lead converted to invoice');
}

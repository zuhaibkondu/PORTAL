<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Azees Travels — B2B Itinerary Builder</title>
<style>
  :root {
    --brand-magenta: #7c236a;
    --brand-magenta-dark: #5a1850;
    --brand-magenta-light: #f5e8f1;
    --brand-gold: #ba9c62;
    --brand-gold-dark: #8e7547;
    --brand-gold-light: #faf4e8;
    --ink: #1a1a1a;
    --ink-soft: #4a4a4a;
    --ink-muted: #888;
    --line: #e8e3da;
    --bg: #faf8f5;
    --white: #ffffff;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--ink);
    line-height: 1.5;
    font-size: 14px;
  }

  /* ============ TOP NAV ============ */
  .topnav {
    background: var(--ink);
    color: white;
    padding: 14px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 3px solid var(--brand-gold);
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .nav-brand {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .nav-logo {
    width: 44px; height: 44px;
    background: white;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 4px;
    box-sizing: border-box;
  }
  .nav-title {
    font-size: 11px;
    letter-spacing: 4px;
    font-weight: 600;
  }
  .nav-sub {
    font-size: 8.5px;
    letter-spacing: 2.5px;
    color: var(--brand-gold);
    margin-top: 2px;
  }
  .nav-actions {
    display: flex;
    gap: 8px;
  }
  .nav-btn {
    background: transparent;
    color: white;
    border: 1px solid #444;
    padding: 7px 14px;
    font-size: 11px;
    letter-spacing: 1.5px;
    cursor: pointer;
    text-transform: uppercase;
    font-weight: 600;
    transition: all 0.2s;
    font-family: inherit;
  }
  .nav-btn:hover {
    background: var(--brand-magenta);
    border-color: var(--brand-magenta);
  }
  .nav-btn.primary {
    background: var(--brand-magenta);
    border-color: var(--brand-magenta);
  }
  .nav-btn.primary:hover {
    background: var(--brand-magenta-dark);
  }
  .nav-btn.gold {
    background: var(--brand-gold);
    color: var(--ink);
    border-color: var(--brand-gold);
  }
  .nav-btn.gold:hover {
    background: var(--brand-gold-dark);
    color: white;
  }

  /* ============ MODULE SWITCHER ============ */
  .module-switcher {
    display: flex;
    gap: 4px;
    background: rgba(255,255,255,0.05);
    padding: 4px;
    border: 1px solid #333;
  }
  .mod-btn {
    background: transparent;
    color: #aaa;
    border: none;
    padding: 8px 16px;
    font-size: 11px;
    letter-spacing: 1.5px;
    cursor: pointer;
    text-transform: uppercase;
    font-weight: 600;
    font-family: inherit;
    transition: all 0.2s;
  }
  .mod-btn:hover {
    color: white;
    background: rgba(255,255,255,0.05);
  }
  .mod-btn.active {
    background: var(--brand-gold);
    color: var(--ink);
  }

  /* ============ LAYOUT ============ */
  .app {
    display: grid;
    grid-template-columns: 320px 1fr 460px;
    height: calc(100vh - 65px);
    overflow: hidden;
  }

  /* ============ SIDEBAR ============ */
  .sidebar {
    background: white;
    border-right: 1px solid var(--line);
    overflow-y: auto;
    padding: 20px 18px;
  }
  .sidebar h3 {
    font-size: 10px;
    letter-spacing: 2.5px;
    color: var(--brand-magenta);
    font-weight: 700;
    text-transform: uppercase;
    margin-bottom: 10px;
    padding-bottom: 8px;
    border-bottom: 2px solid var(--brand-gold);
  }
  .saved-list {
    list-style: none;
    margin-bottom: 24px;
  }
  .saved-item {
    background: var(--bg);
    padding: 10px 12px;
    margin-bottom: 6px;
    border-left: 3px solid var(--brand-gold);
    cursor: pointer;
    font-size: 12px;
    transition: all 0.15s;
    position: relative;
  }
  .saved-item:hover {
    background: var(--brand-magenta-light);
    border-left-color: var(--brand-magenta);
  }
  .saved-item-title {
    font-weight: 600;
    color: var(--ink);
    margin-bottom: 3px;
    padding-right: 22px;
  }
  .saved-item-meta {
    color: var(--ink-muted);
    font-size: 10.5px;
    letter-spacing: 0.5px;
  }
  .saved-item-delete {
    position: absolute;
    top: 8px;
    right: 8px;
    background: transparent;
    border: none;
    color: var(--ink-muted);
    cursor: pointer;
    font-size: 14px;
    padding: 2px 6px;
    line-height: 1;
  }
  .saved-item-delete:hover {
    color: var(--brand-magenta);
  }
  .saved-empty {
    font-size: 11px;
    color: var(--ink-muted);
    font-style: italic;
    padding: 8px 0;
  }
  .new-btn {
    width: 100%;
    background: var(--brand-magenta);
    color: white;
    border: none;
    padding: 11px;
    font-size: 11px;
    letter-spacing: 2px;
    cursor: pointer;
    text-transform: uppercase;
    font-weight: 700;
    font-family: inherit;
    transition: background 0.2s;
    margin-bottom: 24px;
  }
  .new-btn:hover { background: var(--brand-magenta-dark); }

  .quick-templates {
    margin-top: 6px;
  }
  .template-btn {
    width: 100%;
    background: var(--brand-gold-light);
    color: var(--ink);
    border: 1px solid var(--brand-gold);
    padding: 9px 11px;
    font-size: 11px;
    cursor: pointer;
    text-align: left;
    margin-bottom: 5px;
    font-family: inherit;
    transition: all 0.15s;
  }
  .template-btn:hover {
    background: var(--brand-gold);
    color: var(--ink);
  }
  .template-btn strong {
    display: block;
    font-size: 11.5px;
    margin-bottom: 1px;
  }
  .template-btn span {
    font-size: 10px;
    color: var(--ink-muted);
    letter-spacing: 1px;
  }

  /* ============ BUILDER (MAIN) ============ */
  .builder {
    overflow-y: auto;
    padding: 24px 28px;
    background: var(--bg);
  }
  .builder-header {
    background: linear-gradient(135deg, var(--brand-magenta) 0%, var(--brand-magenta-dark) 100%);
    color: white;
    padding: 18px 22px;
    margin-bottom: 18px;
    position: relative;
    overflow: hidden;
  }
  .builder-header::after {
    content: '';
    position: absolute;
    top: 0; right: 0;
    width: 0; height: 0;
    border-style: solid;
    border-width: 0 50px 50px 0;
    border-color: transparent var(--brand-gold) transparent transparent;
  }
  .builder-header h1 {
    font-size: 18px;
    font-weight: 300;
    letter-spacing: 1.5px;
    margin-bottom: 3px;
  }
  .builder-header p {
    font-size: 10.5px;
    letter-spacing: 2px;
    color: var(--brand-gold);
    text-transform: uppercase;
    font-weight: 600;
  }

  .section {
    background: white;
    margin-bottom: 14px;
    border: 1px solid var(--line);
  }
  .section-head {
    padding: 12px 18px;
    border-bottom: 1px solid var(--line);
    background: var(--brand-magenta-light);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .section-head h2 {
    font-size: 11px;
    letter-spacing: 2.5px;
    color: var(--brand-magenta);
    font-weight: 700;
    text-transform: uppercase;
  }
  .section-head .badge {
    background: var(--brand-magenta);
    color: white;
    font-size: 10px;
    padding: 3px 8px;
    letter-spacing: 1px;
    font-weight: 600;
  }
  .section-body {
    padding: 16px 18px;
  }

  /* Form fields */
  .row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 10px;
  }
  .row.row-3 { grid-template-columns: 1fr 1fr 1fr; }
  .row.row-1 { grid-template-columns: 1fr; }
  .field {
    display: flex;
    flex-direction: column;
  }
  .field label {
    font-size: 9.5px;
    letter-spacing: 1.8px;
    color: var(--brand-gold-dark);
    text-transform: uppercase;
    font-weight: 700;
    margin-bottom: 5px;
  }
  .field input, .field textarea, .field select {
    border: 1px solid var(--line);
    padding: 8px 10px;
    font-size: 13px;
    font-family: inherit;
    background: white;
    color: var(--ink);
    transition: border-color 0.15s;
  }
  .field input:focus, .field textarea:focus, .field select:focus {
    outline: none;
    border-color: var(--brand-magenta);
  }
  .field textarea {
    resize: vertical;
    min-height: 70px;
    line-height: 1.5;
  }

  /* Day blocks */
  .day-card {
    background: white;
    border: 1px solid var(--line);
    margin-bottom: 10px;
    overflow: hidden;
  }
  .day-card-head {
    background: var(--ink);
    color: white;
    padding: 9px 14px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .day-card-num {
    background: var(--brand-gold);
    color: var(--ink);
    width: 32px;
    height: 32px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    font-size: 13px;
  }
  .day-card-title {
    flex: 1;
    margin: 0 12px;
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.5px;
  }
  .day-card-actions {
    display: flex;
    gap: 4px;
  }
  .icon-btn {
    background: transparent;
    color: white;
    border: 1px solid #555;
    padding: 4px 9px;
    cursor: pointer;
    font-size: 10px;
    font-family: inherit;
    transition: all 0.15s;
  }
  .icon-btn:hover {
    background: var(--brand-magenta);
    border-color: var(--brand-magenta);
  }
  .icon-btn.danger:hover {
    background: #c0392b;
    border-color: #c0392b;
  }
  .day-card-body {
    padding: 14px;
  }
  .add-day {
    width: 100%;
    background: var(--brand-gold);
    color: var(--ink);
    border: none;
    padding: 12px;
    font-size: 11px;
    letter-spacing: 2px;
    cursor: pointer;
    text-transform: uppercase;
    font-weight: 700;
    font-family: inherit;
    margin-top: 4px;
    transition: background 0.2s;
  }
  .add-day:hover { background: var(--brand-gold-dark); color: white; }

  /* Pricing table inputs */
  .price-table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 8px;
  }
  .price-table th, .price-table td {
    border: 1px solid var(--line);
    padding: 6px 8px;
    font-size: 11.5px;
  }
  .price-table th {
    background: var(--ink);
    color: var(--brand-gold);
    font-size: 9.5px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    font-weight: 700;
  }
  .price-table td.label {
    background: var(--bg);
    font-weight: 500;
  }
  .price-table input {
    width: 100%;
    border: none;
    padding: 5px;
    font-size: 12px;
    text-align: center;
    background: transparent;
    font-family: inherit;
    color: var(--ink);
  }
  .price-table input:focus {
    outline: 1px solid var(--brand-magenta);
    background: var(--brand-magenta-light);
  }

  /* ============ PREVIEW PANEL ============ */
  .preview {
    background: #2a2a2a;
    color: #e8e8e8;
    overflow-y: auto;
    padding: 18px;
    display: flex;
    flex-direction: column;
  }
  .preview-tabs {
    display: flex;
    margin-bottom: 14px;
    border-bottom: 1px solid #444;
  }
  .preview-tab {
    background: transparent;
    color: #aaa;
    border: none;
    padding: 9px 14px;
    font-size: 10px;
    letter-spacing: 1.8px;
    cursor: pointer;
    text-transform: uppercase;
    font-weight: 600;
    font-family: inherit;
    border-bottom: 2px solid transparent;
    transition: all 0.15s;
  }
  .preview-tab.active {
    color: var(--brand-gold);
    border-bottom-color: var(--brand-gold);
  }
  .preview-tab:hover { color: white; }

  .preview-content {
    flex: 1;
    background: white;
    color: var(--ink);
    padding: 24px;
    overflow-y: auto;
    font-size: 12px;
    line-height: 1.6;
  }
  .preview-content.email-mode {
    background: white;
    padding: 0;
  }
  .preview-actions {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-top: 14px;
  }
  .copy-btn {
    background: var(--brand-gold);
    color: var(--ink);
    border: none;
    padding: 12px;
    font-size: 11px;
    letter-spacing: 2px;
    cursor: pointer;
    text-transform: uppercase;
    font-weight: 700;
    font-family: inherit;
    transition: background 0.2s;
  }
  .copy-btn:hover { background: var(--brand-gold-dark); color: white; }
  .copy-btn.magenta {
    background: var(--brand-magenta);
    color: white;
  }
  .copy-btn.magenta:hover { background: var(--brand-magenta-dark); }
  .copy-feedback {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--brand-magenta);
    color: white;
    padding: 12px 24px;
    font-size: 12px;
    letter-spacing: 2px;
    text-transform: uppercase;
    font-weight: 700;
    opacity: 0;
    transition: opacity 0.3s;
    z-index: 1000;
    pointer-events: none;
  }
  .copy-feedback.show { opacity: 1; }

  /* ============ FORMATTED EMAIL OUTPUT ============ */
  .email-output {
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    font-size: 13px;
    line-height: 1.65;
    color: #2a2a2a;
    background: white;
    padding: 32px 28px;
  }
  .email-output h2.brand {
    color: var(--brand-magenta);
    font-size: 18px;
    letter-spacing: 4px;
    font-weight: 300;
    margin-bottom: 4px;
    text-transform: uppercase;
  }
  .email-output .brand-sub {
    color: var(--brand-gold);
    font-size: 9px;
    letter-spacing: 3px;
    font-weight: 600;
    margin-bottom: 18px;
    text-transform: uppercase;
    border-bottom: 2px solid var(--brand-gold);
    padding-bottom: 12px;
  }
  .email-output h3 {
    color: var(--brand-magenta);
    font-size: 13px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    font-weight: 700;
    margin-top: 22px;
    margin-bottom: 10px;
    border-left: 3px solid var(--brand-gold);
    padding-left: 10px;
  }
  .email-output .greeting {
    margin-bottom: 14px;
    color: var(--ink-soft);
  }
  .email-output .meta-block {
    background: var(--bg);
    padding: 12px 14px;
    margin-bottom: 18px;
    border-left: 3px solid var(--brand-magenta);
    font-size: 12px;
  }
  .email-output .meta-block strong {
    color: var(--brand-magenta);
    letter-spacing: 1px;
  }
  .email-output .day {
    background: var(--bg);
    padding: 12px 14px;
    margin-bottom: 8px;
    border-left: 3px solid var(--brand-gold);
  }
  .email-output .day-num {
    background: var(--brand-magenta);
    color: white;
    display: inline-block;
    padding: 2px 9px;
    font-size: 10px;
    letter-spacing: 1.5px;
    font-weight: 700;
    margin-bottom: 5px;
  }
  .email-output .day-title {
    font-size: 13px;
    font-weight: 600;
    color: var(--ink);
    margin-bottom: 5px;
  }
  .email-output .day-desc {
    font-size: 12px;
    color: var(--ink-soft);
    line-height: 1.6;
  }
  .email-output .day-meta {
    font-size: 10.5px;
    color: var(--ink-muted);
    margin-top: 5px;
    letter-spacing: 0.5px;
  }
  .email-output .day-meta strong { color: var(--brand-gold-dark); }
  .email-output table.price {
    width: 100%;
    border-collapse: collapse;
    margin-top: 6px;
    font-size: 11.5px;
  }
  .email-output table.price th {
    background: var(--brand-magenta);
    color: white;
    padding: 7px 8px;
    font-size: 10px;
    letter-spacing: 1.2px;
    text-transform: uppercase;
    border: 1px solid var(--brand-magenta-dark);
  }
  .email-output table.price td {
    padding: 6px 8px;
    border: 1px solid var(--line);
    text-align: center;
  }
  .email-output table.price td.label {
    text-align: left;
    background: var(--brand-gold-light);
    font-weight: 600;
  }
  .email-output .inc-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-top: 6px;
  }
  .email-output .inc-grid ul {
    list-style: none;
    padding: 0;
  }
  .email-output .inc-grid li {
    padding: 3px 0 3px 16px;
    font-size: 11.5px;
    position: relative;
    color: var(--ink-soft);
  }
  .email-output .inc-grid li.yes::before {
    content: '✓';
    color: var(--brand-magenta);
    position: absolute;
    left: 0;
    font-weight: 700;
  }
  .email-output .inc-grid li.no::before {
    content: '✕';
    color: #c0392b;
    position: absolute;
    left: 0;
    font-weight: 700;
  }
  .email-output .signature {
    margin-top: 24px;
    padding-top: 14px;
    border-top: 2px solid var(--brand-gold);
    font-size: 11.5px;
    color: var(--ink-soft);
    line-height: 1.7;
  }
  .email-output .signature strong {
    color: var(--brand-magenta);
    font-size: 13px;
    letter-spacing: 0.5px;
  }
  .email-output .signature .gold {
    color: var(--brand-gold-dark);
    font-weight: 600;
  }

  /* Plain text view */
  .plain-output {
    font-family: 'Courier New', monospace;
    font-size: 12px;
    line-height: 1.55;
    background: var(--bg);
    padding: 18px;
    white-space: pre-wrap;
    color: var(--ink-soft);
    border: 1px dashed var(--line);
  }

  /* Scrollbar polish */
  ::-webkit-scrollbar { width: 9px; height: 9px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb {
    background: var(--brand-gold);
    border-radius: 0;
  }
  ::-webkit-scrollbar-thumb:hover { background: var(--brand-magenta); }

  /* Loading state */
  .loading {
    text-align: center;
    padding: 40px;
    color: var(--ink-muted);
    font-size: 12px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
  }
</style>
</head>
<body>

<!-- ============ TOP NAV ============ -->
<nav class="topnav">
  <div class="nav-brand">
    <div class="nav-logo"><img id="nav-logo-img" alt="Azees Travels" style="width: 100%; height: 100%; object-fit: contain;"/></div>
    <div>
      <div class="nav-title">AZEES TRAVELS</div>
      <div class="nav-sub">B2B Portal · Trade Partner Tools</div>
    </div>
  </div>
  <div class="module-switcher">
    <button class="mod-btn active" id="mod-itinerary" data-mod="itinerary">📋 Itinerary Builder</button>
    <button class="mod-btn" id="mod-invoice" data-mod="invoice">🧾 Invoice Generator</button>
  </div>
  <div class="nav-actions">
    <button class="nav-btn gold" id="btn-save">💾 Save</button>
    <button class="nav-btn" id="btn-export-pdf">📄 PDF</button>
    <button class="nav-btn" id="btn-export-word">📝 Word</button>
    <button class="nav-btn primary" id="btn-export">↓ HTML</button>
    <button class="nav-btn" id="btn-clear">⟲ Reset</button>
  </div>
</nav>

<!-- ============ APP LAYOUT ============ -->
<div class="app">

  <!-- ===== SIDEBAR: Saved itineraries + templates ===== -->
  <aside class="sidebar">
    <button class="new-btn" id="btn-new">+ New Itinerary</button>

    <h3>📋 Quick Templates</h3>
    <div class="quick-templates" id="template-list"></div>

    <h3 style="margin-top: 22px;">💼 Saved Itineraries</h3>
    <ul class="saved-list" id="saved-list">
      <li class="saved-empty">Loading...</li>
    </ul>
  </aside>

  <!-- ===== BUILDER ===== -->
  <main class="builder" id="builder">
    <div class="loading">Initializing builder...</div>
  </main>

  <!-- ===== PREVIEW PANEL ===== -->
  <aside class="preview">
    <div class="preview-tabs">
      <button class="preview-tab active" data-mode="email">📧 Email HTML</button>
      <button class="preview-tab" data-mode="plain">📄 Plain Text</button>
    </div>
    <div class="preview-content email-mode" id="preview-content">
      <div class="loading">Live preview will appear here...</div>
    </div>
    <div class="preview-actions">
      <button class="copy-btn magenta" id="btn-copy-rich">⎘ Copy Rich Email</button>
      <button class="copy-btn" id="btn-copy-plain">⎘ Copy Plain Text</button>
    </div>
  </aside>

</div>

<div class="copy-feedback" id="copy-feedback">✓ Copied to clipboard</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

/* ================================================================
   STORAGE (localStorage-based, works in any browser including Vercel deploy)
================================================================ */
const _storage = {
  async get(key) {
    try {
      const v = localStorage.getItem(key);
      return v !== null ? { value: v } : null;
    } catch (e) { return null; }
  },
  async set(key, value) {
    try {
      localStorage.setItem(key, value);
      return { value };
    } catch (e) {
      throw new Error('Storage failed: ' + (e.message || 'unknown'));
    }
  },
  async delete(key) {
    try {
      localStorage.removeItem(key);
      return { deleted: true };
    } catch (e) { return null; }
  },
  async list(prefix) {
    try {
      const keys = [];
      for (let i = 0; i < localStorage.length; i++) {
        const k = localStorage.key(i);
        if (k && k.startsWith(prefix)) keys.push(k);
      }
      return { keys };
    } catch (e) { return { keys: [] }; }
  }
};

async function loadSavedList() {
  try {
    const result = await _storage.list(STORAGE_PREFIX);
    return result?.keys || [];
  } catch (e) {
    return [];
  }
}

async function loadItinerary(key) {
  try {
    const result = await _storage.get(key);
    return result ? JSON.parse(result.value) : null;
  } catch (e) {
    return null;
  }
}

async function saveItinerary(itin) {
  const key = STORAGE_PREFIX + itin.id;
  try {
    await _storage.set(key, JSON.stringify(itin));
    return true;
  } catch (e) {
    alert('Could not save: ' + e.message);
    return false;
  }
}

async function deleteItinerary(key) {
  try {
    await _storage.delete(key);
    return true;
  } catch (e) {
    return false;
  }
}

function attachBuilderListeners() {
  // Top-level fields
  ['agency', 'contact', 'quoteNo', 'issueDate', 'validity', 'title', 'destination', 'nights', 'days', 'routeSummary', 'category', 'notes'].forEach(key => {
    const el = document.getElementById('f-' + key);
    if (el) el.addEventListener('input', () => {
      state[key] = el.value;
      renderPreview();
    });
  });

  // Inclusions/exclusions (split on newline)
  ['inclusions', 'exclusions'].forEach(key => {
    const el = document.getElementById('f-' + key);
    if (el) el.addEventListener('input', () => {
      state[key] = el.value.split('\n').map(s => s.trim()).filter(Boolean);
      renderPreview();
    });
  });

  // Day fields
  document.querySelectorAll('[data-day]').forEach(el => {
    el.addEventListener('input', () => {
      const idx = parseInt(el.dataset.day);
      const key = el.dataset.key;
      state.daysList[idx][key] = el.value;
      if (key === 'title') {
        const titleEl = el.closest('.day-card').querySelector('.day-card-title');
        if (titleEl) titleEl.textContent = el.value || 'Untitled Day';
      }
      renderPreview();
    });
  });

  // Day actions
  document.querySelectorAll('[data-action]').forEach(btn => {
    btn.addEventListener('click', () => {
      const action = btn.dataset.action;
      const i = parseInt(btn.dataset.i);
      if (action === 'up' && i > 0) {
        [state.daysList[i - 1], state.daysList[i]] = [state.daysList[i], state.daysList[i - 1]];
      } else if (action === 'down' && i < state.daysList.length - 1) {
        [state.daysList[i + 1], state.daysList[i]] = [state.daysList[i], state.daysList[i + 1]];
      } else if (action === 'del') {
        if (state.daysList.length > 1) {
          state.daysList.splice(i, 1);
        } else {
          alert('At least one day is required.');
          return;
        }
      }
      renderBuilder();
      renderPreview();
    });
  });

  // Add day
  const addDayBtn = document.getElementById('btn-add-day');
  if (addDayBtn) addDayBtn.addEventListener('click', () => {
    state.daysList.push({ route: '', title: 'New Day', stay: '', desc: '', meals: 'Breakfast · Dinner' });
    renderBuilder();
    renderPreview();
  });

  // Hotel fields
  document.querySelectorAll('[data-hotel]').forEach(el => {
    el.addEventListener('input', () => {
      const idx = parseInt(el.dataset.hotel);
      const key = el.dataset.key;
      state.hotels[idx][key] = el.value;
      if (key === 'city') {
        const titleEl = el.closest('.day-card').querySelector('.day-card-title');
        if (titleEl) titleEl.textContent = el.value || 'Destination';
      }
      renderPreview();
    });
  });

  // Hotel delete
  document.querySelectorAll('[data-hotel-action]').forEach(btn => {
    btn.addEventListener('click', () => {
      const i = parseInt(btn.dataset.i);
      if (state.hotels.length > 1) {
        state.hotels.splice(i, 1);
        renderBuilder();
        renderPreview();
      } else {
        alert('At least one destination row is required.');
      }
    });
  });

  // Add hotel
  const addHotelBtn = document.getElementById('btn-add-hotel');
  if (addHotelBtn) addHotelBtn.addEventListener('click', () => {
    state.hotels.push({ city: 'New Destination', nights: '', star3: '', star4: '', star5: '' });
    renderBuilder();
    renderPreview();
  });

  // Pricing fields (simplified — pax, rooms, total)
  ['pax', 'rooms', 'total'].forEach(key => {
    const el = document.getElementById('f-' + key);
    if (el) el.addEventListener('input', () => {
      state.pricing[key] = el.value;
      renderPreview();
    });
  });
}

    </td>
  </tr></table>`;
  html += `<div class="brand-sub">B2B Trade Partner Itinerary · Confidential</div>`;

  if (s.notes && s.notes.trim()) {
    html += `<div class="greeting">${escapeHtml(s.notes).replace(/\n/g, '<br/>')}</div>`;

  // Meta block
  html += `<div class="meta-block">`;
  if (s.agency) html += `<strong>To:</strong> ${escapeHtml(s.agency)}${s.contact ? ' (Attn: ' + escapeHtml(s.contact) + ')' : ''}<br/>`;

/* ================================================================
   SAVED ITINERARIES LIST
================================================================ */
async function refreshSavedList() {
  const ul = document.getElementById('saved-list');
  const keys = await loadSavedList();
  if (!keys.length) {
    ul.innerHTML = '<li class="saved-empty">No saved itineraries yet. Build one and click Save.</li>';
    return;
  }

  const items = [];
  for (const key of keys) {
    const itin = await loadItinerary(key);
    if (itin) items.push({ key, itin });
  }
  items.sort((a, b) => (b.itin.id || '').localeCompare(a.itin.id || ''));

  ul.innerHTML = items.map(({ key, itin }) => `
    <li class="saved-item" data-key="${escapeAttr(key)}">
      <div class="saved-item-title">${escapeHtml(itin.title || 'Untitled')}</div>
      <div class="saved-item-meta">${escapeHtml(itin.nights || '?')}N/${escapeHtml(itin.days || '?')}D · ${escapeHtml(itin.agency || 'No agency')}</div>
      <button class="saved-item-delete" data-del-key="${escapeAttr(key)}" title="Delete">✕</button>
    </li>
  `).join('');

  ul.querySelectorAll('.saved-item').forEach(li => {
    li.addEventListener('click', async (e) => {
      if (e.target.closest('.saved-item-delete')) return;
      const key = li.dataset.key;
      const itin = await loadItinerary(key);
      if (itin) {
        state = itin;
        activeItineraryId = key;
        renderBuilder();
        renderPreview();
        showFeedback('✓ Loaded: ' + (itin.title || 'Untitled'));
      }
    });
  });

  ul.querySelectorAll('[data-del-key]').forEach(btn => {
    btn.addEventListener('click', async (e) => {
      e.stopPropagation();
      const key = btn.dataset.delKey;
      if (confirm('Delete this itinerary permanently?')) {
        await deleteItinerary(key);
        await refreshSavedList();
        showFeedback('✓ Deleted');
      }
    });
  });
}

function renderTemplates() {
  const el = document.getElementById('template-list');
  el.innerHTML = TEMPLATES.map((t, i) => `
    <button class="template-btn" data-tpl="${i}">
      <strong>${escapeHtml(t.name)}</strong>
      <span>${escapeHtml(t.sub)}</span>
    </button>
  `).join('');
  el.querySelectorAll('[data-tpl]').forEach(btn => {
    btn.addEventListener('click', () => {
      const i = parseInt(btn.dataset.tpl);
      const tpl = TEMPLATES[i];
      if (confirm('Load template "' + tpl.name + '"? This will replace current data.')) {
        state = createBlankItinerary();
        tpl.apply(state);
        state.id = 'itin_' + Date.now();
        activeItineraryId = null;
        renderBuilder();
        renderPreview();
        showFeedback('✓ Template loaded');
      }
    });
  });
}

/* ================================================================
   COPY TO CLIPBOARD
================================================================ */
async function copyRichHTML() {
  const html = buildEmailHTML();
  const plain = buildPlainText();
  try {
    if (navigator.clipboard && window.ClipboardItem) {
      const blob = new Blob([html], { type: 'text/html' });
      const plainBlob = new Blob([plain], { type: 'text/plain' });
      await navigator.clipboard.write([
        new ClipboardItem({ 'text/html': blob, 'text/plain': plainBlob })
      ]);
      showFeedback('✓ Rich email copied — paste into Gmail');
    } else {
      throw new Error('Clipboard API unavailable');
    }
  } catch (e) {
    // Fallback: select preview content and copy
    const el = document.getElementById('preview-content');
    const range = document.createRange();
    range.selectNodeContents(el);
    const sel = window.getSelection();
    sel.removeAllRanges();
    sel.addRange(range);
    document.execCommand('copy');
    sel.removeAllRanges();
    showFeedback('✓ Copied (fallback method)');
  }
}

async function copyPlainText() {
  try {
    await navigator.clipboard.writeText(buildPlainText());
    showFeedback('✓ Plain text copied');
  } catch (e) {
    alert('Could not copy. Please select manually.');
  }
}

function showFeedback(msg) {
  const el = document.getElementById('copy-feedback');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2200);
}

/* ================================================================
   UTILITIES
================================================================ */
function escapeHtml(str) {
  if (str === undefined || str === null) return '';
  return String(str).replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
}
function escapeAttr(str) { return escapeHtml(str); }

async function copyInvoiceRichHTML() {
  const html = buildInvoiceHTML();
  const plain = buildInvoicePlainText();
  try {
    if (navigator.clipboard && window.ClipboardItem) {
      const blob = new Blob([html], { type: 'text/html' });
      const plainBlob = new Blob([plain], { type: 'text/plain' });
      await navigator.clipboard.write([new ClipboardItem({ 'text/html': blob, 'text/plain': plainBlob })]);
      showFeedback('✓ Invoice copied — paste into Gmail');
    } else { throw new Error('Clipboard API unavailable'); }
  } catch (e) {
    const el = document.getElementById('preview-content');
    const range = document.createRange();
    range.selectNodeContents(el);
    const sel = window.getSelection();
    sel.removeAllRanges();
    sel.addRange(range);
    document.execCommand('copy');
    sel.removeAllRanges();
    showFeedback('✓ Copied (fallback)');
  }
}

async function copyInvoicePlainText() {
  try {
    await navigator.clipboard.writeText(buildInvoicePlainText());
    showFeedback('✓ Plain text copied');
  } catch (e) {
    alert('Could not copy.');
  }
}

});

const CURRENCIES = {
  'INR': { symbol: '₹', code: 'INR', name: 'Indian Rupee', locale: 'en-IN' },
  'USD': { symbol: '$', code: 'USD', name: 'US Dollar', locale: 'en-US' },
  'EUR': { symbol: '€', code: 'EUR', name: 'Euro', locale: 'de-DE' },
  'MUR': { symbol: 'Rs', code: 'MUR', name: 'Mauritian Rupee', locale: 'en-MU' },
  'MYR': { symbol: 'RM', code: 'MYR', name: 'Malaysian Ringgit', locale: 'ms-MY' }
};

const PAYMENT_METHODS = {
  'bank': 'Bank Transfer (NEFT / SWIFT)',
  'razorpay': 'Razorpay / Stripe Link',
  'paypal': 'PayPal',
  'upi': 'WhatsApp / UPI',
  'cash': 'Cash on Arrival',
  'juice': 'Juice (Mauritius)'
};

function createBlankInvoice() {
  const year = new Date().getFullYear();
  const seq = String(Math.floor(Math.random() * 9000) + 1000);
  return {
    id: 'inv_' + Date.now(),
    invoiceNo: `INV-${year}-${seq}`,
    issueDate: new Date().toISOString().split('T')[0],
    dueDate: '',
    clientType: 'B2C',
    clientName: '',
    clientAddress: '',
    clientEmail: '',
    clientPhone: '',
    clientCountry: '',
    destination: '',
    travelStart: '',
    travelEnd: '',
    paxCount: '',
    currency: 'INR',
    items: [
      { desc: 'Tour Package — Kashmir 5N/6D', qty: 1, rate: '', amount: '0.00', amountManual: false }
    ],
    discount: '',
    paid: '',
    paymentMethods: ['bank', 'upi'],
    bankDetails: {
      accountName: 'AZEES TRAVELS',
      accountNo: '',
      ifsc: '',
      bankName: '',
      branch: '',
      swift: ''
    },
    notes: 'Thank you for choosing Azees Travels for your journey.',
    terms: '50% advance to confirm booking. Balance payable 7 days before travel. Cancellation as per terms.'
  };
}

function formatCurrency(amount, currencyCode) {
  const c = CURRENCIES[currencyCode] || CURRENCIES.INR;
  if (amount === '' || amount === null || amount === undefined || isNaN(amount)) return c.symbol + ' 0.00';
  return c.symbol + ' ' + Number(amount).toLocaleString(c.locale, { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

function calcInvoiceTotals(inv) {
  const subtotal = inv.items.reduce((sum, it) => {
    // Use manual amount if it was set, otherwise auto-calc
    if (it.amountManual && it.amount !== '' && it.amount !== undefined && !isNaN(it.amount)) {
      return sum + Number(it.amount);
    }
    const q = Number(it.qty) || 0;
    const r = Number(it.rate) || 0;
    return sum + (q * r);
  }, 0);
  const discount = Number(inv.discount) || 0;
  const grandTotal = Math.max(0, subtotal - discount);
  const paid = Number(inv.paid) || 0;
  const balanceDue = grandTotal - paid;
  return { subtotal, discount, grandTotal, paid, balanceDue };
}

            </div>
          </div>
        ` : ''}
      </div>
    </div>

    <!-- ===== NOTES & TERMS ===== -->
    <div class="section">
      <div class="section-head"><h2>⑦ Notes & Terms</h2></div>
      <div class="section-body">
        <div class="row">
          <div class="field"><label>Thank-you Note (top of invoice)</label><textarea id="inv-notes" rows="2">${escapeHtml(inv.notes)}</textarea></div>
          <div class="field"><label>Terms & Conditions</label><textarea id="inv-terms" rows="2">${escapeHtml(inv.terms)}</textarea></div>
        </div>
      </div>
    </div>

    <div style="height: 40px;"></div>
  `;

  attachInvoiceListeners();
}

function attachInvoiceListeners() {
  // Top-level fields — only update preview, not builder, to preserve focus
  const topFields = ['invoiceNo', 'issueDate', 'dueDate', 'clientType', 'clientName', 'clientCountry',
    'clientEmail', 'clientPhone', 'clientAddress', 'destination', 'travelStart', 'travelEnd',
    'paxCount', 'discount', 'paid', 'notes', 'terms'];

  topFields.forEach(key => {
    const el = document.getElementById('inv-' + key);
    if (!el) return;
    el.addEventListener('input', () => {
      invoiceState[key] = el.value;
      renderInvoicePreview();
    });
  });

  // Currency change — re-render builder (so symbols update everywhere)
  const curEl = document.getElementById('inv-currency');
  if (curEl) curEl.addEventListener('change', () => {
    invoiceState.currency = curEl.value;
    renderInvoiceBuilder();
    renderInvoicePreview();
  });

  // Client type change — re-render so dropdown updates correctly
  const ctEl = document.getElementById('inv-clientType');
  if (ctEl) ctEl.addEventListener('change', () => {
    invoiceState.clientType = ctEl.value;
    renderInvoicePreview();
  });

  // Bank detail fields
  ['accountName', 'accountNo', 'ifsc', 'bankName', 'branch', 'swift'].forEach(key => {
    const el = document.getElementById('inv-bank-' + key);
    if (el) el.addEventListener('input', () => {
      invoiceState.bankDetails[key] = el.value;
      renderInvoicePreview();
    });
  });

  // Line item fields — only update preview AND amount cell, never re-render builder
  document.querySelectorAll('[data-item]').forEach(el => {
    el.addEventListener('input', () => {
      const idx = parseInt(el.dataset.item);
      const key = el.dataset.key;
      invoiceState.items[idx][key] = el.value;

      // If qty or rate changed, recalc the amount field for this row (unless manually overridden)
      if ((key === 'qty' || key === 'rate') && !invoiceState.items[idx].amountManual) {
        const item = invoiceState.items[idx];
        const calcAmount = (Number(item.qty) || 0) * (Number(item.rate) || 0);
        item.amount = calcAmount.toFixed(2);
        // Update the amount input in DOM directly (don't re-render)
        const amountEl = document.querySelector(`[data-item-amount="${idx}"]`);
        if (amountEl) amountEl.value = calcAmount.toFixed(2);
      }

      renderInvoicePreview();
    });
  });

  // Amount field — manual override
  document.querySelectorAll('[data-item-amount]').forEach(el => {
    el.addEventListener('input', () => {
      const idx = parseInt(el.dataset.itemAmount);
      invoiceState.items[idx].amount = el.value;
      invoiceState.items[idx].amountManual = true;
      renderInvoicePreview();
    });
  });

  // Reset amount to auto-calc (double-click amount field)
  document.querySelectorAll('[data-item-amount]').forEach(el => {
    el.addEventListener('dblclick', () => {
      const idx = parseInt(el.dataset.itemAmount);
      const item = invoiceState.items[idx];
      item.amountManual = false;
      const calcAmount = (Number(item.qty) || 0) * (Number(item.rate) || 0);
      item.amount = calcAmount.toFixed(2);
      el.value = calcAmount.toFixed(2);
      renderInvoicePreview();
      showFeedback('Amount reset to auto');
    });
  });

  // Delete item — needs full re-render since rows change
  document.querySelectorAll('[data-item-del]').forEach(btn => {
    btn.addEventListener('click', () => {
      const idx = parseInt(btn.dataset.itemDel);
      if (invoiceState.items.length > 1) {
        invoiceState.items.splice(idx, 1);
        renderInvoiceBuilder();
        renderInvoicePreview();
      } else {
        alert('At least one line item is required.');
      }
    });
  });

  // Add item — needs full re-render to show new row
  const addBtn = document.getElementById('inv-add-item');
  if (addBtn) addBtn.addEventListener('click', () => {
    invoiceState.items.push({ desc: '', qty: 1, rate: '', amount: '0.00', amountManual: false });
    renderInvoiceBuilder();
    renderInvoicePreview();
  });

  // Payment method toggles
  document.querySelectorAll('[data-pm]').forEach(cb => {
    cb.addEventListener('change', () => {
      const key = cb.dataset.pm;
      if (cb.checked) {
        if (!invoiceState.paymentMethods.includes(key)) invoiceState.paymentMethods.push(key);
      } else {
        invoiceState.paymentMethods = invoiceState.paymentMethods.filter(p => p !== key);
      }
      renderInvoiceBuilder();
      renderInvoicePreview();
    });
  });
}

/* ================================================================
   INVOICE SAVE / LOAD
================================================================ */
async function saveInvoice(inv) {
  const key = INV_STORAGE_PREFIX + inv.id;
  try {
    await _storage.set(key, JSON.stringify(inv));
    return true;
  } catch (e) {
    alert('Could not save invoice: ' + e.message);
    return false;
  }
}

async function loadInvoice(key) {
  try {
    const result = await _storage.get(key);
    return result ? JSON.parse(result.value) : null;
  } catch (e) {
    return null;
  }
}

async function deleteInvoice(key) {
  try {
    await _storage.delete(key);
    return true;
  } catch (e) {
    return false;
  }
}

async function loadInvoiceList() {
  try {
    const result = await _storage.list(INV_STORAGE_PREFIX);
    return result?.keys || [];
  } catch (e) {
    return [];
  }
}

async function refreshInvoiceList() {
  const ul = document.getElementById('saved-list');
  const keys = await loadInvoiceList();
  if (!keys.length) {
    ul.innerHTML = '<li class="saved-empty">No saved invoices yet. Build one and click Save.</li>';
    return;
  }
  const items = [];
  for (const key of keys) {
    const inv = await loadInvoice(key);
    if (inv) items.push({ key, inv });
  }
  items.sort((a, b) => (b.inv.id || '').localeCompare(a.inv.id || ''));
  ul.innerHTML = items.map(({ key, inv }) => {
    const t = calcInvoiceTotals(inv);
    const cur = CURRENCIES[inv.currency] || CURRENCIES.INR;
    return `
      <li class="saved-item" data-inv-key="${escapeAttr(key)}">
        <div class="saved-item-title">${escapeHtml(inv.invoiceNo)}</div>
        <div class="saved-item-meta">${escapeHtml(inv.clientName || 'No client')} · ${cur.symbol}${Math.round(t.grandTotal).toLocaleString()}</div>
        <button class="saved-item-delete" data-inv-del-key="${escapeAttr(key)}" title="Delete">✕</button>
      </li>
    `;
  }).join('');

  ul.querySelectorAll('.saved-item').forEach(li => {
    li.addEventListener('click', async (e) => {
      if (e.target.closest('.saved-item-delete')) return;
      const key = li.dataset.invKey;
      const inv = await loadInvoice(key);
      if (inv) {
        invoiceState = inv;
        activeInvoiceId = key;
        renderInvoiceBuilder();
        renderInvoicePreview();
        showFeedback('✓ Loaded: ' + inv.invoiceNo);
      }
    });
  });

  ul.querySelectorAll('[data-inv-del-key]').forEach(btn => {
    btn.addEventListener('click', async (e) => {
      e.stopPropagation();
      const key = btn.dataset.invDelKey;
      if (confirm('Delete this invoice permanently?')) {
        await deleteInvoice(key);
        await refreshInvoiceList();
        showFeedback('✓ Deleted');
      }
    });
  });
}

function exportInvoiceAsWord() {
  const wordHTML = `<html xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:w="urn:schemas-microsoft-com:office:word" xmlns="http://www.w3.org/TR/REC-html40">

  setTimeout(() => URL.revokeObjectURL(url), 500);

/* ================================================================
   MODULE SWITCHING
================================================================ */
function switchModule(mod) {
  currentModule = mod;
  document.querySelectorAll('.mod-btn').forEach(b => b.classList.toggle('active', b.dataset.mod === mod));

  if (mod === 'itinerary') {
    renderBuilder();
    renderPreview();
    refreshSavedList();
    document.querySelector('.sidebar h3').textContent = '📋 Quick Templates';
    document.querySelectorAll('.sidebar h3')[1].textContent = '💼 Saved Itineraries';
    document.querySelector('.quick-templates').style.display = '';
  } else {
    renderInvoiceBuilder();
    renderInvoicePreview();
    refreshInvoiceList();
    document.querySelector('.sidebar h3').textContent = '🧾 Invoice Tools';
    document.querySelectorAll('.sidebar h3')[1].textContent = '📑 Saved Invoices';
    document.querySelector('.quick-templates').style.display = 'none';
  }
}

document.getElementById('mod-itinerary').addEventListener('click', () => switchModule('itinerary'));
document.getElementById('mod-invoice').addEventListener('click', () => switchModule('invoice'));

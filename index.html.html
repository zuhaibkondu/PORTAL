<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Azees Travels — B2B Itinerary Builder</title>
<style>
  :root {
    --brand-magenta: #7c236a;
    --brand-magenta-dark: #5a1850;
    --brand-magenta-light: #f5e8f1;
    --brand-gold: #ba9c62;
    --brand-gold-dark: #8e7547;
    --brand-gold-light: #faf4e8;
    --ink: #1a1a1a;
    --ink-soft: #4a4a4a;
    --ink-muted: #888;
    --line: #e8e3da;
    --bg: #faf8f5;
    --white: #ffffff;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--ink);
    line-height: 1.5;
    font-size: 14px;
  }

  /* ============ TOP NAV ============ */
  .topnav {
    background: var(--ink);
    color: white;
    padding: 14px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 3px solid var(--brand-gold);
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .nav-brand {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .nav-logo {
    width: 38px; height: 38px;
    background: var(--brand-gold);
    color: var(--ink);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    font-weight: 300;
  }
  .nav-title {
    font-size: 11px;
    letter-spacing: 4px;
    font-weight: 600;
  }
  .nav-sub {
    font-size: 8.5px;
    letter-spacing: 2.5px;
    color: var(--brand-gold);
    margin-top: 2px;
  }
  .nav-actions {
    display: flex;
    gap: 8px;
  }
  .nav-btn {
    background: transparent;
    color: white;
    border: 1px solid #444;
    padding: 7px 14px;
    font-size: 11px;
    letter-spacing: 1.5px;
    cursor: pointer;
    text-transform: uppercase;
    font-weight: 600;
    transition: all 0.2s;
    font-family: inherit;
  }
  .nav-btn:hover {
    background: var(--brand-magenta);
    border-color: var(--brand-magenta);
  }
  .nav-btn.primary {
    background: var(--brand-magenta);
    border-color: var(--brand-magenta);
  }
  .nav-btn.primary:hover {
    background: var(--brand-magenta-dark);
  }
  .nav-btn.gold {
    background: var(--brand-gold);
    color: var(--ink);
    border-color: var(--brand-gold);
  }
  .nav-btn.gold:hover {
    background: var(--brand-gold-dark);
    color: white;
  }

  /* ============ LAYOUT ============ */
  .app {
    display: grid;
    grid-template-columns: 320px 1fr 460px;
    height: calc(100vh - 65px);
    overflow: hidden;
  }

  /* ============ SIDEBAR ============ */
  .sidebar {
    background: white;
    border-right: 1px solid var(--line);
    overflow-y: auto;
    padding: 20px 18px;
  }
  .sidebar h3 {
    font-size: 10px;
    letter-spacing: 2.5px;
    color: var(--brand-magenta);
    font-weight: 700;
    text-transform: uppercase;
    margin-bottom: 10px;
    padding-bottom: 8px;
    border-bottom: 2px solid var(--brand-gold);
  }
  .saved-list {
    list-style: none;
    margin-bottom: 24px;
  }
  .saved-item {
    background: var(--bg);
    padding: 10px 12px;
    margin-bottom: 6px;
    border-left: 3px solid var(--brand-gold);
    cursor: pointer;
    font-size: 12px;
    transition: all 0.15s;
    position: relative;
  }
  .saved-item:hover {
    background: var(--brand-magenta-light);
    border-left-color: var(--brand-magenta);
  }
  .saved-item-title {
    font-weight: 600;
    color: var(--ink);
    margin-bottom: 3px;
    padding-right: 22px;
  }
  .saved-item-meta {
    color: var(--ink-muted);
    font-size: 10.5px;
    letter-spacing: 0.5px;
  }
  .saved-item-delete {
    position: absolute;
    top: 8px;
    right: 8px;
    background: transparent;
    border: none;
    color: var(--ink-muted);
    cursor: pointer;
    font-size: 14px;
    padding: 2px 6px;
    line-height: 1;
  }
  .saved-item-delete:hover {
    color: var(--brand-magenta);
  }
  .saved-empty {
    font-size: 11px;
    color: var(--ink-muted);
    font-style: italic;
    padding: 8px 0;
  }
  .new-btn {
    width: 100%;
    background: var(--brand-magenta);
    color: white;
    border: none;
    padding: 11px;
    font-size: 11px;
    letter-spacing: 2px;
    cursor: pointer;
    text-transform: uppercase;
    font-weight: 700;
    font-family: inherit;
    transition: background 0.2s;
    margin-bottom: 24px;
  }
  .new-btn:hover { background: var(--brand-magenta-dark); }

  .quick-templates {
    margin-top: 6px;
  }
  .template-btn {
    width: 100%;
    background: var(--brand-gold-light);
    color: var(--ink);
    border: 1px solid var(--brand-gold);
    padding: 9px 11px;
    font-size: 11px;
    cursor: pointer;
    text-align: left;
    margin-bottom: 5px;
    font-family: inherit;
    transition: all 0.15s;
  }
  .template-btn:hover {
    background: var(--brand-gold);
    color: var(--ink);
  }
  .template-btn strong {
    display: block;
    font-size: 11.5px;
    margin-bottom: 1px;
  }
  .template-btn span {
    font-size: 10px;
    color: var(--ink-muted);
    letter-spacing: 1px;
  }

  /* ============ BUILDER (MAIN) ============ */
  .builder {
    overflow-y: auto;
    padding: 24px 28px;
    background: var(--bg);
  }
  .builder-header {
    background: linear-gradient(135deg, var(--brand-magenta) 0%, var(--brand-magenta-dark) 100%);
    color: white;
    padding: 18px 22px;
    margin-bottom: 18px;
    position: relative;
    overflow: hidden;
  }
  .builder-header::after {
    content: '';
    position: absolute;
    top: 0; right: 0;
    width: 0; height: 0;
    border-style: solid;
    border-width: 0 50px 50px 0;
    border-color: transparent var(--brand-gold) transparent transparent;
  }
  .builder-header h1 {
    font-size: 18px;
    font-weight: 300;
    letter-spacing: 1.5px;
    margin-bottom: 3px;
  }
  .builder-header p {
    font-size: 10.5px;
    letter-spacing: 2px;
    color: var(--brand-gold);
    text-transform: uppercase;
    font-weight: 600;
  }

  .section {
    background: white;
    margin-bottom: 14px;
    border: 1px solid var(--line);
  }
  .section-head {
    padding: 12px 18px;
    border-bottom: 1px solid var(--line);
    background: var(--brand-magenta-light);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .section-head h2 {
    font-size: 11px;
    letter-spacing: 2.5px;
    color: var(--brand-magenta);
    font-weight: 700;
    text-transform: uppercase;
  }
  .section-head .badge {
    background: var(--brand-magenta);
    color: white;
    font-size: 10px;
    padding: 3px 8px;
    letter-spacing: 1px;
    font-weight: 600;
  }
  .section-body {
    padding: 16px 18px;
  }

  /* Form fields */
  .row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 10px;
  }
  .row.row-3 { grid-template-columns: 1fr 1fr 1fr; }
  .row.row-1 { grid-template-columns: 1fr; }
  .field {
    display: flex;
    flex-direction: column;
  }
  .field label {
    font-size: 9.5px;
    letter-spacing: 1.8px;
    color: var(--brand-gold-dark);
    text-transform: uppercase;
    font-weight: 700;
    margin-bottom: 5px;
  }
  .field input, .field textarea, .field select {
    border: 1px solid var(--line);
    padding: 8px 10px;
    font-size: 13px;
    font-family: inherit;
    background: white;
    color: var(--ink);
    transition: border-color 0.15s;
  }
  .field input:focus, .field textarea:focus, .field select:focus {
    outline: none;
    border-color: var(--brand-magenta);
  }
  .field textarea {
    resize: vertical;
    min-height: 70px;
    line-height: 1.5;
  }

  /* Day blocks */
  .day-card {
    background: white;
    border: 1px solid var(--line);
    margin-bottom: 10px;
    overflow: hidden;
  }
  .day-card-head {
    background: var(--ink);
    color: white;
    padding: 9px 14px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .day-card-num {
    background: var(--brand-gold);
    color: var(--ink);
    width: 32px;
    height: 32px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    font-size: 13px;
  }
  .day-card-title {
    flex: 1;
    margin: 0 12px;
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.5px;
  }
  .day-card-actions {
    display: flex;
    gap: 4px;
  }
  .icon-btn {
    background: transparent;
    color: white;
    border: 1px solid #555;
    padding: 4px 9px;
    cursor: pointer;
    font-size: 10px;
    font-family: inherit;
    transition: all 0.15s;
  }
  .icon-btn:hover {
    background: var(--brand-magenta);
    border-color: var(--brand-magenta);
  }
  .icon-btn.danger:hover {
    background: #c0392b;
    border-color: #c0392b;
  }
  .day-card-body {
    padding: 14px;
  }
  .add-day {
    width: 100%;
    background: var(--brand-gold);
    color: var(--ink);
    border: none;
    padding: 12px;
    font-size: 11px;
    letter-spacing: 2px;
    cursor: pointer;
    text-transform: uppercase;
    font-weight: 700;
    font-family: inherit;
    margin-top: 4px;
    transition: background 0.2s;
  }
  .add-day:hover { background: var(--brand-gold-dark); color: white; }

  /* Pricing table inputs */
  .price-table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 8px;
  }
  .price-table th, .price-table td {
    border: 1px solid var(--line);
    padding: 6px 8px;
    font-size: 11.5px;
  }
  .price-table th {
    background: var(--ink);
    color: var(--brand-gold);
    font-size: 9.5px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    font-weight: 700;
  }
  .price-table td.label {
    background: var(--bg);
    font-weight: 500;
  }
  .price-table input {
    width: 100%;
    border: none;
    padding: 5px;
    font-size: 12px;
    text-align: center;
    background: transparent;
    font-family: inherit;
    color: var(--ink);
  }
  .price-table input:focus {
    outline: 1px solid var(--brand-magenta);
    background: var(--brand-magenta-light);
  }

  /* ============ PREVIEW PANEL ============ */
  .preview {
    background: #2a2a2a;
    color: #e8e8e8;
    overflow-y: auto;
    padding: 18px;
    display: flex;
    flex-direction: column;
  }
  .preview-tabs {
    display: flex;
    margin-bottom: 14px;
    border-bottom: 1px solid #444;
  }
  .preview-tab {
    background: transparent;
    color: #aaa;
    border: none;
    padding: 9px 14px;
    font-size: 10px;
    letter-spacing: 1.8px;
    cursor: pointer;
    text-transform: uppercase;
    font-weight: 600;
    font-family: inherit;
    border-bottom: 2px solid transparent;
    transition: all 0.15s;
  }
  .preview-tab.active {
    color: var(--brand-gold);
    border-bottom-color: var(--brand-gold);
  }
  .preview-tab:hover { color: white; }

  .preview-content {
    flex: 1;
    background: white;
    color: var(--ink);
    padding: 24px;
    overflow-y: auto;
    font-size: 12px;
    line-height: 1.6;
  }
  .preview-content.email-mode {
    background: white;
    padding: 0;
  }
  .preview-actions {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-top: 14px;
  }
  .copy-btn {
    background: var(--brand-gold);
    color: var(--ink);
    border: none;
    padding: 12px;
    font-size: 11px;
    letter-spacing: 2px;
    cursor: pointer;
    text-transform: uppercase;
    font-weight: 700;
    font-family: inherit;
    transition: background 0.2s;
  }
  .copy-btn:hover { background: var(--brand-gold-dark); color: white; }
  .copy-btn.magenta {
    background: var(--brand-magenta);
    color: white;
  }
  .copy-btn.magenta:hover { background: var(--brand-magenta-dark); }
  .copy-feedback {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--brand-magenta);
    color: white;
    padding: 12px 24px;
    font-size: 12px;
    letter-spacing: 2px;
    text-transform: uppercase;
    font-weight: 700;
    opacity: 0;
    transition: opacity 0.3s;
    z-index: 1000;
    pointer-events: none;
  }
  .copy-feedback.show { opacity: 1; }

  /* ============ FORMATTED EMAIL OUTPUT ============ */
  .email-output {
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    font-size: 13px;
    line-height: 1.65;
    color: #2a2a2a;
    background: white;
    padding: 32px 28px;
  }
  .email-output h2.brand {
    color: var(--brand-magenta);
    font-size: 18px;
    letter-spacing: 4px;
    font-weight: 300;
    margin-bottom: 4px;
    text-transform: uppercase;
  }
  .email-output .brand-sub {
    color: var(--brand-gold);
    font-size: 9px;
    letter-spacing: 3px;
    font-weight: 600;
    margin-bottom: 18px;
    text-transform: uppercase;
    border-bottom: 2px solid var(--brand-gold);
    padding-bottom: 12px;
  }
  .email-output h3 {
    color: var(--brand-magenta);
    font-size: 13px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    font-weight: 700;
    margin-top: 22px;
    margin-bottom: 10px;
    border-left: 3px solid var(--brand-gold);
    padding-left: 10px;
  }
  .email-output .greeting {
    margin-bottom: 14px;
    color: var(--ink-soft);
  }
  .email-output .meta-block {
    background: var(--bg);
    padding: 12px 14px;
    margin-bottom: 18px;
    border-left: 3px solid var(--brand-magenta);
    font-size: 12px;
  }
  .email-output .meta-block strong {
    color: var(--brand-magenta);
    letter-spacing: 1px;
  }
  .email-output .day {
    background: var(--bg);
    padding: 12px 14px;
    margin-bottom: 8px;
    border-left: 3px solid var(--brand-gold);
  }
  .email-output .day-num {
    background: var(--brand-magenta);
    color: white;
    display: inline-block;
    padding: 2px 9px;
    font-size: 10px;
    letter-spacing: 1.5px;
    font-weight: 700;
    margin-bottom: 5px;
  }
  .email-output .day-title {
    font-size: 13px;
    font-weight: 600;
    color: var(--ink);
    margin-bottom: 5px;
  }
  .email-output .day-desc {
    font-size: 12px;
    color: var(--ink-soft);
    line-height: 1.6;
  }
  .email-output .day-meta {
    font-size: 10.5px;
    color: var(--ink-muted);
    margin-top: 5px;
    letter-spacing: 0.5px;
  }
  .email-output .day-meta strong { color: var(--brand-gold-dark); }
  .email-output table.price {
    width: 100%;
    border-collapse: collapse;
    margin-top: 6px;
    font-size: 11.5px;
  }
  .email-output table.price th {
    background: var(--brand-magenta);
    color: white;
    padding: 7px 8px;
    font-size: 10px;
    letter-spacing: 1.2px;
    text-transform: uppercase;
    border: 1px solid var(--brand-magenta-dark);
  }
  .email-output table.price td {
    padding: 6px 8px;
    border: 1px solid var(--line);
    text-align: center;
  }
  .email-output table.price td.label {
    text-align: left;
    background: var(--brand-gold-light);
    font-weight: 600;
  }
  .email-output .inc-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-top: 6px;
  }
  .email-output .inc-grid ul {
    list-style: none;
    padding: 0;
  }
  .email-output .inc-grid li {
    padding: 3px 0 3px 16px;
    font-size: 11.5px;
    position: relative;
    color: var(--ink-soft);
  }
  .email-output .inc-grid li.yes::before {
    content: '✓';
    color: var(--brand-magenta);
    position: absolute;
    left: 0;
    font-weight: 700;
  }
  .email-output .inc-grid li.no::before {
    content: '✕';
    color: #c0392b;
    position: absolute;
    left: 0;
    font-weight: 700;
  }
  .email-output .signature {
    margin-top: 24px;
    padding-top: 14px;
    border-top: 2px solid var(--brand-gold);
    font-size: 11.5px;
    color: var(--ink-soft);
    line-height: 1.7;
  }
  .email-output .signature strong {
    color: var(--brand-magenta);
    font-size: 13px;
    letter-spacing: 0.5px;
  }
  .email-output .signature .gold {
    color: var(--brand-gold-dark);
    font-weight: 600;
  }

  /* Plain text view */
  .plain-output {
    font-family: 'Courier New', monospace;
    font-size: 12px;
    line-height: 1.55;
    background: var(--bg);
    padding: 18px;
    white-space: pre-wrap;
    color: var(--ink-soft);
    border: 1px dashed var(--line);
  }

  /* Scrollbar polish */
  ::-webkit-scrollbar { width: 9px; height: 9px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb {
    background: var(--brand-gold);
    border-radius: 0;
  }
  ::-webkit-scrollbar-thumb:hover { background: var(--brand-magenta); }

  /* Loading state */
  .loading {
    text-align: center;
    padding: 40px;
    color: var(--ink-muted);
    font-size: 12px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
  }
</style>
</head>
<body>

<!-- ============ TOP NAV ============ -->
<nav class="topnav">
  <div class="nav-brand">
    <div class="nav-logo">A</div>
    <div>
      <div class="nav-title">AZEES TRAVELS</div>
      <div class="nav-sub">B2B Itinerary Builder · Trade Partner Portal</div>
    </div>
  </div>
  <div class="nav-actions">
    <button class="nav-btn gold" id="btn-save">💾 Save</button>
    <button class="nav-btn" id="btn-export-pdf">📄 PDF</button>
    <button class="nav-btn" id="btn-export-word">📝 Word</button>
    <button class="nav-btn primary" id="btn-export">↓ HTML</button>
    <button class="nav-btn" id="btn-clear">⟲ Reset</button>
  </div>
</nav>

<!-- ============ APP LAYOUT ============ -->
<div class="app">

  <!-- ===== SIDEBAR: Saved itineraries + templates ===== -->
  <aside class="sidebar">
    <button class="new-btn" id="btn-new">+ New Itinerary</button>

    <h3>📋 Quick Templates</h3>
    <div class="quick-templates" id="template-list"></div>

    <h3 style="margin-top: 22px;">💼 Saved Itineraries</h3>
    <ul class="saved-list" id="saved-list">
      <li class="saved-empty">Loading...</li>
    </ul>
  </aside>

  <!-- ===== BUILDER ===== -->
  <main class="builder" id="builder">
    <div class="loading">Initializing builder...</div>
  </main>

  <!-- ===== PREVIEW PANEL ===== -->
  <aside class="preview">
    <div class="preview-tabs">
      <button class="preview-tab active" data-mode="email">📧 Email HTML</button>
      <button class="preview-tab" data-mode="plain">📄 Plain Text</button>
    </div>
    <div class="preview-content email-mode" id="preview-content">
      <div class="loading">Live preview will appear here...</div>
    </div>
    <div class="preview-actions">
      <button class="copy-btn magenta" id="btn-copy-rich">⎘ Copy Rich Email</button>
      <button class="copy-btn" id="btn-copy-plain">⎘ Copy Plain Text</button>
    </div>
  </aside>

</div>

<div class="copy-feedback" id="copy-feedback">✓ Copied to clipboard</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<script>
'use strict';

/* ================================================================
   DATA MODEL & STATE
================================================================ */
const STORAGE_PREFIX = 'azees_itin:';
let state = createBlankItinerary();
let activeItineraryId = null;
let previewMode = 'email';

function createBlankItinerary() {
  return {
    id: 'itin_' + Date.now(),
    title: 'Untitled Kashmir Itinerary',
    agency: '',
    contact: '',
    quoteNo: 'AZ-B2B-' + new Date().getFullYear() + '-' + String(Math.floor(Math.random() * 9000) + 1000),
    issueDate: new Date().toISOString().split('T')[0],
    validity: '',
    destination: 'Kashmir',
    nights: 5,
    days: 6,
    routeSummary: '',
    category: 'Deluxe (4★)',
    daysList: [
      { route: 'Arrival · Srinagar', title: 'Welcome to the Valley', stay: 'Srinagar Houseboat', desc: 'Arrival at Srinagar Airport, welcome Kahwa, transfer to deluxe houseboat. Evening shikara ride on Dal Lake.', meals: 'Welcome Kahwa · Lunch · Dinner' }
    ],
    hotels: [
      { city: 'Srinagar', nights: '2 Nights · Houseboat', star3: 'Young Bombay Heritage', star4: 'Wangnoo Heritage', star5: 'Sukoon Houseboat' }
    ],
    pricing: {
      pax: '',
      rooms: '',
      total: ''
    },

/* ================================================================
   STORAGE
================================================================ */
async function loadSavedList() {
  try {
    const result = await window.storage.list(STORAGE_PREFIX);
    return result?.keys || [];
  } catch (e) {
    return [];
  }
}

async function loadItinerary(key) {
  try {
    const result = await window.storage.get(key);
    return result ? JSON.parse(result.value) : null;
  } catch (e) {
    return null;
  }
}

async function saveItinerary(itin) {
  const key = STORAGE_PREFIX + itin.id;
  try {
    await window.storage.set(key, JSON.stringify(itin));
    return true;
  } catch (e) {
    alert('Could not save: ' + e.message);
    return false;
  }
}

async function deleteItinerary(key) {
  try {
    await window.storage.delete(key);
    return true;
  } catch (e) {
    return false;
  }
}

function attachBuilderListeners() {
  // Top-level fields
  ['agency', 'contact', 'quoteNo', 'issueDate', 'validity', 'title', 'destination', 'nights', 'days', 'routeSummary', 'category', 'notes'].forEach(key => {
    const el = document.getElementById('f-' + key);
    if (el) el.addEventListener('input', () => {
      state[key] = el.value;
      renderPreview();
    });
  });

  // Inclusions/exclusions (split on newline)
  ['inclusions', 'exclusions'].forEach(key => {
    const el = document.getElementById('f-' + key);
    if (el) el.addEventListener('input', () => {
      state[key] = el.value.split('\n').map(s => s.trim()).filter(Boolean);
      renderPreview();
    });
  });

  // Day fields
  document.querySelectorAll('[data-day]').forEach(el => {
    el.addEventListener('input', () => {
      const idx = parseInt(el.dataset.day);
      const key = el.dataset.key;
      state.daysList[idx][key] = el.value;
      if (key === 'title') {
        const titleEl = el.closest('.day-card').querySelector('.day-card-title');
        if (titleEl) titleEl.textContent = el.value || 'Untitled Day';
      }
      renderPreview();
    });
  });

  // Day actions
  document.querySelectorAll('[data-action]').forEach(btn => {
    btn.addEventListener('click', () => {
      const action = btn.dataset.action;
      const i = parseInt(btn.dataset.i);
      if (action === 'up' && i > 0) {
        [state.daysList[i - 1], state.daysList[i]] = [state.daysList[i], state.daysList[i - 1]];
      } else if (action === 'down' && i < state.daysList.length - 1) {
        [state.daysList[i + 1], state.daysList[i]] = [state.daysList[i], state.daysList[i + 1]];
      } else if (action === 'del') {
        if (state.daysList.length > 1) {
          state.daysList.splice(i, 1);
        } else {
          alert('At least one day is required.');
          return;
        }
      }
      renderBuilder();
      renderPreview();
    });
  });

  // Add day
  const addDayBtn = document.getElementById('btn-add-day');
  if (addDayBtn) addDayBtn.addEventListener('click', () => {
    state.daysList.push({ route: '', title: 'New Day', stay: '', desc: '', meals: 'Breakfast · Dinner' });
    renderBuilder();
    renderPreview();
  });

  // Hotel fields
  document.querySelectorAll('[data-hotel]').forEach(el => {
    el.addEventListener('input', () => {
      const idx = parseInt(el.dataset.hotel);
      const key = el.dataset.key;
      state.hotels[idx][key] = el.value;
      if (key === 'city') {
        const titleEl = el.closest('.day-card').querySelector('.day-card-title');
        if (titleEl) titleEl.textContent = el.value || 'Destination';
      }
      renderPreview();
    });
  });

  // Hotel delete
  document.querySelectorAll('[data-hotel-action]').forEach(btn => {
    btn.addEventListener('click', () => {
      const i = parseInt(btn.dataset.i);
      if (state.hotels.length > 1) {
        state.hotels.splice(i, 1);
        renderBuilder();
        renderPreview();
      } else {
        alert('At least one destination row is required.');
      }
    });
  });

  // Add hotel
  const addHotelBtn = document.getElementById('btn-add-hotel');
  if (addHotelBtn) addHotelBtn.addEventListener('click', () => {
    state.hotels.push({ city: 'New Destination', nights: '', star3: '', star4: '', star5: '' });
    renderBuilder();
    renderPreview();
  });

  // Pricing fields (simplified — pax, rooms, total)
  ['pax', 'rooms', 'total'].forEach(key => {
    const el = document.getElementById('f-' + key);
    if (el) el.addEventListener('input', () => {
      state.pricing[key] = el.value;
      renderPreview();
    });
  });
}

function renderPreview() {
  const el = document.getElementById('preview-content');
  if (previewMode === 'email') {
    el.className = 'preview-content email-mode';
    el.innerHTML = buildEmailHTML();
  } else {
    el.className = 'preview-content';
    el.innerHTML = '<div class="plain-output">' + escapeHtml(buildPlainText()) + '</div>';
  }
}

function buildEmailHTML() {
  const s = state;
  const formatPrice = (v) => v && !isNaN(v) ? Number(v).toLocaleString('en-IN') : '—';

  let html = '<div class="email-output">';
  html += `<h2 class="brand">AZEES TRAVELS</h2>`;
  html += `<div class="brand-sub">B2B Trade Partner Itinerary · Confidential</div>`;

  if (s.notes && s.notes.trim()) {
    html += `<div class="greeting">${escapeHtml(s.notes).replace(/\n/g, '<br/>')}</div>`;
  }

  // Meta block
  html += `<div class="meta-block">`;
  if (s.agency) html += `<strong>To:</strong> ${escapeHtml(s.agency)}${s.contact ? ' (Attn: ' + escapeHtml(s.contact) + ')' : ''}<br/>`;
  html += `<strong>Quote:</strong> ${escapeHtml(s.quoteNo)} &nbsp;|&nbsp; <strong>Date:</strong> ${escapeHtml(s.issueDate)}`;
  if (s.validity) html += ` &nbsp;|&nbsp; <strong>Valid till:</strong> ${escapeHtml(s.validity)}`;
  html += `<br/><strong>Package:</strong> ${escapeHtml(s.title)} &nbsp;|&nbsp; <strong>Duration:</strong> ${escapeHtml(s.nights)}N / ${escapeHtml(s.days)}D`;
  if (s.routeSummary) html += `<br/><strong>Route:</strong> ${escapeHtml(s.routeSummary)}`;

/* ================================================================
   SAVED ITINERARIES LIST
================================================================ */
async function refreshSavedList() {
  const ul = document.getElementById('saved-list');
  const keys = await loadSavedList();
  if (!keys.length) {
    ul.innerHTML = '<li class="saved-empty">No saved itineraries yet. Build one and click Save.</li>';
    return;
  }

  const items = [];
  for (const key of keys) {
    const itin = await loadItinerary(key);
    if (itin) items.push({ key, itin });
  }
  items.sort((a, b) => (b.itin.id || '').localeCompare(a.itin.id || ''));

  ul.innerHTML = items.map(({ key, itin }) => `
    <li class="saved-item" data-key="${escapeAttr(key)}">
      <div class="saved-item-title">${escapeHtml(itin.title || 'Untitled')}</div>
      <div class="saved-item-meta">${escapeHtml(itin.nights || '?')}N/${escapeHtml(itin.days || '?')}D · ${escapeHtml(itin.agency || 'No agency')}</div>
      <button class="saved-item-delete" data-del-key="${escapeAttr(key)}" title="Delete">✕</button>
    </li>
  `).join('');

  ul.querySelectorAll('.saved-item').forEach(li => {
    li.addEventListener('click', async (e) => {
      if (e.target.closest('.saved-item-delete')) return;
      const key = li.dataset.key;
      const itin = await loadItinerary(key);
      if (itin) {
        state = itin;
        activeItineraryId = key;
        renderBuilder();
        renderPreview();
        showFeedback('✓ Loaded: ' + (itin.title || 'Untitled'));
      }
    });
  });

  ul.querySelectorAll('[data-del-key]').forEach(btn => {
    btn.addEventListener('click', async (e) => {
      e.stopPropagation();
      const key = btn.dataset.delKey;
      if (confirm('Delete this itinerary permanently?')) {
        await deleteItinerary(key);
        await refreshSavedList();
        showFeedback('✓ Deleted');
      }
    });
  });
}

function renderTemplates() {
  const el = document.getElementById('template-list');
  el.innerHTML = TEMPLATES.map((t, i) => `
    <button class="template-btn" data-tpl="${i}">
      <strong>${escapeHtml(t.name)}</strong>
      <span>${escapeHtml(t.sub)}</span>
    </button>
  `).join('');
  el.querySelectorAll('[data-tpl]').forEach(btn => {
    btn.addEventListener('click', () => {
      const i = parseInt(btn.dataset.tpl);
      const tpl = TEMPLATES[i];
      if (confirm('Load template "' + tpl.name + '"? This will replace current data.')) {
        state = createBlankItinerary();
        tpl.apply(state);
        state.id = 'itin_' + Date.now();
        activeItineraryId = null;
        renderBuilder();
        renderPreview();
        showFeedback('✓ Template loaded');
      }
    });
  });
}

/* ================================================================
   COPY TO CLIPBOARD
================================================================ */
async function copyRichHTML() {
  const html = buildEmailHTML();
  const plain = buildPlainText();
  try {
    if (navigator.clipboard && window.ClipboardItem) {
      const blob = new Blob([html], { type: 'text/html' });
      const plainBlob = new Blob([plain], { type: 'text/plain' });
      await navigator.clipboard.write([
        new ClipboardItem({ 'text/html': blob, 'text/plain': plainBlob })
      ]);
      showFeedback('✓ Rich email copied — paste into Gmail');
    } else {
      throw new Error('Clipboard API unavailable');
    }
  } catch (e) {
    // Fallback: select preview content and copy
    const el = document.getElementById('preview-content');
    const range = document.createRange();
    range.selectNodeContents(el);
    const sel = window.getSelection();
    sel.removeAllRanges();
    sel.addRange(range);
    document.execCommand('copy');
    sel.removeAllRanges();
    showFeedback('✓ Copied (fallback method)');
  }
}

async function copyPlainText() {
  try {
    await navigator.clipboard.writeText(buildPlainText());
    showFeedback('✓ Plain text copied');
  } catch (e) {
    alert('Could not copy. Please select manually.');
  }
}

function showFeedback(msg) {
  const el = document.getElementById('copy-feedback');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2200);
}

function exportAsPDF() {
  showFeedback('⏳ Generating PDF, please wait...');

  // Build complete styled HTML with all email-output CSS inlined
  const wrapper = document.createElement('div');
  wrapper.id = 'pdf-render-target';
  wrapper.style.cssText = 'position: fixed; left: 0; top: 0; width: 794px; background: white; z-index: -1; opacity: 0; pointer-events: none;';

  // Inject the email content with full inline styles for reliable rendering
  wrapper.innerHTML = `
    <div style="padding: 30px 35px; font-family: Helvetica, Arial, sans-serif; color: #2a2a2a; background: white; box-sizing: border-box; width: 794px;">
      ${buildEmailHTMLForPDF()}
    </div>
  `;
  document.body.appendChild(wrapper);

  const filename = (state.title || 'azees-itinerary').replace(/[^a-z0-9]/gi, '-').toLowerCase() + '.pdf';

  const opt = {
    margin: [8, 8, 8, 8],
    filename: filename,
    image: { type: 'jpeg', quality: 0.95 },
    html2canvas: {
      scale: 2,
      useCORS: true,
      letterRendering: true,
      logging: false,
      backgroundColor: '#ffffff',
      windowWidth: 794
    },
    jsPDF: {
      unit: 'mm',
      format: 'a4',
      orientation: 'portrait',
      compress: true
    },
    pagebreak: { mode: ['css', 'legacy'], avoid: ['.day', '.meta-block', 'table', 'h3'] }
  };

  // Give the DOM a moment to layout before capture
  setTimeout(() => {
    html2pdf().set(opt).from(wrapper).save().then(() => {
      document.body.removeChild(wrapper);
      showFeedback('✓ PDF downloaded successfully');
    }).catch(err => {
      if (wrapper.parentNode) document.body.removeChild(wrapper);
      console.error('PDF error:', err);
      alert('PDF generation failed: ' + (err.message || 'unknown error') + '\n\nAs a fallback, click the HTML button and use your browser Print → Save as PDF.');
    });
  }, 200);
}

    s.exclusions.forEach(item => html += `<div style="padding:3px 0 3px 16px; position:relative; color:#4a4a4a;"><span style="color:#c0392b; font-weight:700; position:absolute; left:0;">✕</span>${escapeHtml(item)}</div>`);
    html += `</div></td></tr></table>`;
  }

  // Signature
  html += `<div style="margin-top: 26px; padding-top: 14px; border-top: 2px solid #ba9c62; font-size: 11.5px; color: #4a4a4a; line-height: 1.7; page-break-inside: avoid;">

    <strong style="color: #8e7547; font-size: 11.5px;">M:</strong> +91 84910 64038 &nbsp;·&nbsp;

    <strong style="color: #8e7547; font-size: 11.5px;">W:</strong> www.azeestravels.com
  </div>`;

  return html;
}

/* ================================================================
   EXPORT AS WORD DOCUMENT (.doc with MS Office HTML format)
================================================================ */
function exportAsWord() {
  // Microsoft Word reads HTML with MSO conditional comments
  const wordHTML = `<html xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:w="urn:schemas-microsoft-com:office:word" xmlns="http://www.w3.org/TR/REC-html40">
<head>
<meta charset="utf-8">
<title>${escapeHtml(state.title)}</title>
<!--[if gte mso 9]>
<xml>
<w:WordDocument>
<w:View>Print</w:View>
<w:Zoom>100</w:Zoom>
<w:DoNotOptimizeForBrowser/>
</w:WordDocument>
</xml>
<![endif]-->
<style>
@page { size: A4 portrait; margin: 1.5cm; }
body { font-family: 'Calibri', 'Helvetica Neue', Arial, sans-serif; font-size: 11pt; line-height: 1.5; color: #2a2a2a; }
</style>
</head>
<body>${buildEmailHTMLForPDF()}</body>
</html>`;

  const blob = new Blob(['\ufeff', wordHTML], { type: 'application/msword;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = (state.title || 'azees-itinerary').replace(/[^a-z0-9]/gi, '-').toLowerCase() + '.doc';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(url), 500);
  showFeedback('✓ Word document downloaded');
}

/* ================================================================
   EXPORT STANDALONE HTML
================================================================ */
function exportAsHTML() {
  const html = buildEmailHTML();
  const fullDoc = `<!DOCTYPE html>
<html><head><meta charset="UTF-8"/><title>${escapeHtml(state.title)} — Azees Travels</title>
<style>
:root { --brand-magenta: #7c236a; --brand-gold: #ba9c62; --brand-gold-light: #faf4e8; --brand-magenta-light: #f5e8f1; --line: #e8e3da; --ink: #1a1a1a; --ink-soft: #4a4a4a; --ink-muted: #888; --bg: #faf8f5; --brand-gold-dark: #8e7547; }
body { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; margin: 40px auto; max-width: 800px; padding: 0 20px; background: #fff; }
${document.querySelector('style').textContent.split('.email-output')[1].split('/* Plain text view */')[0].split('}').map(r => r ? '.email-output' + r + '}' : '').join('')}
</style></head><body>${html}</body></html>`;
  const blob = new Blob([fullDoc], { type: 'text/html' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = (state.title || 'itinerary').replace(/[^a-z0-9]/gi, '-').toLowerCase() + '.html';
  a.click();
  URL.revokeObjectURL(url);
  showFeedback('✓ Downloaded HTML file');
}

/* ================================================================
   UTILITIES
================================================================ */
function escapeHtml(str) {
  if (str === undefined || str === null) return '';
  return String(str).replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
}
function escapeAttr(str) { return escapeHtml(str); }

/* ================================================================
   TOP NAV ACTIONS
================================================================ */
document.getElementById('btn-new').addEventListener('click', () => {
  if (confirm('Start a new blank itinerary? Unsaved changes will be lost.')) {
    state = createBlankItinerary();
    activeItineraryId = null;
    renderBuilder();
    renderPreview();
  }
});

document.getElementById('btn-save').addEventListener('click', async () => {
  if (!state.title || state.title === 'Untitled Kashmir Itinerary') {
    const name = prompt('Enter a name for this itinerary:', state.title);
    if (!name) return;
    state.title = name;
  }
  const ok = await saveItinerary(state);
  if (ok) {
    activeItineraryId = STORAGE_PREFIX + state.id;
    await refreshSavedList();
    renderBuilder();
    showFeedback('✓ Saved: ' + state.title);
  }
});

document.getElementById('btn-clear').addEventListener('click', () => {
  if (confirm('Reset current itinerary to blank? Unsaved changes will be lost.')) {
    state = createBlankItinerary();
    activeItineraryId = null;
    renderBuilder();
    renderPreview();
  }
});

document.getElementById('btn-export').addEventListener('click', exportAsHTML);
document.getElementById('btn-export-pdf').addEventListener('click', exportAsPDF);
document.getElementById('btn-export-word').addEventListener('click', exportAsWord);

document.getElementById('btn-copy-rich').addEventListener('click', copyRichHTML);
document.getElementById('btn-copy-plain').addEventListener('click', copyPlainText);

document.querySelectorAll('.preview-tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.preview-tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    previewMode = tab.dataset.mode;
    renderPreview();
  });
});

/* ================================================================
   INIT
================================================================ */
(async function init() {
  renderTemplates();
  renderBuilder();
  renderPreview();
  await refreshSavedList();
})();
</script>
